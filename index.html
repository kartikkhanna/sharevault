<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
<title>SHARE Anniversary — Activation Read-Out</title>

<!-- Distinctive typography pairing: Fraunces (display) + Inter Tight (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* =========================================================
   CONFIG — set this once
   ========================================================= */
/* See <script> tag at bottom for API_URL config */

/* =========================================================
   CSS RESET + BASE
   ========================================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { font-family: 'Inter Tight', sans-serif; font-weight: 400; line-height: 1.5; }

/* =========================================================
   THEME TOKENS — light is default, dark via [data-theme="dark"]
   ========================================================= */
:root {
  --ink: #0a0a0a;
  --graphite: #3a3a3a;
  --slate: #6b6b6b;
  --muted: #9a9a9a;
  --whisper: #c4c4c4;
  --hairline: #eaeaea;
  --divider: #d4d4d4;
  --paper: #fafafa;
  --card: #ffffff;
  --tint: #f5f5f5;
  --accent: #e6007e;
  --accent-deep: #b0005f;
  --accent-pale: #fdf2f8;
  --success: #1f8a4c;
  --success-tint: #e3f4ea;
  --danger: #c8102e;
  --danger-tint: #fde7e9;
  --warn: #c77e00;
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px -4px rgba(0,0,0,0.08), 0 1px 3px -1px rgba(0,0,0,0.05);
  --shadow-lg: 0 24px 48px -16px rgba(0,0,0,0.12), 0 4px 12px -4px rgba(0,0,0,0.06);
}

[data-theme="dark"] {
  --ink: #f5f5f5;
  --graphite: #d4d4d4;
  --slate: #a1a1a1;
  --muted: #737373;
  --whisper: #525252;
  --hairline: #1f1f1f;
  --divider: #2a2a2a;
  --paper: #0a0a0a;
  --card: #141414;
  --tint: #1a1a1a;
  --accent: #ff3399;
  --accent-deep: #ff66b3;
  --accent-pale: #2a0a1a;
  --success: #4ade80;
  --success-tint: #0e2a1a;
  --danger: #f87171;
  --danger-tint: #2a0a0a;
  --warn: #fbbf24;
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.4);
  --shadow-md: 0 4px 16px -4px rgba(0,0,0,0.6), 0 1px 3px -1px rgba(0,0,0,0.4);
  --shadow-lg: 0 24px 48px -16px rgba(0,0,0,0.8), 0 4px 12px -4px rgba(0,0,0,0.5);
}

body {
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  transition: background-color 240ms ease, color 240ms ease;
}

/* =========================================================
   LAYOUT — generous editorial spacing
   ========================================================= */
.shell {
  max-width: 1240px;
  margin: 0 auto;
  padding: 56px 48px 80px;
}
@media (max-width: 768px) {
  .shell { padding: 32px 20px 56px; }
}

/* =========================================================
   TOP BAR — title, partners, theme toggle, refresh
   ========================================================= */
.top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
  padding-bottom: 24px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--divider);
  animation: slideDown 600ms cubic-bezier(0.16, 1, 0.3, 1) both;
}
.brand-block .title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: clamp(36px, 5vw, 56px);
  line-height: 1.0;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.brand-block .subtitle {
  font-family: 'Inter Tight', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: var(--slate);
  letter-spacing: 0.01em;
  margin-top: 8px;
}
.meta-block {
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
.partners {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  color: var(--muted);
  text-transform: uppercase;
}
.timestamp {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.02em;
}
.toggle-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.icon-btn {
  background: var(--card);
  border: 1px solid var(--hairline);
  color: var(--slate);
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-family: inherit;
  transition: all 160ms ease;
}
.icon-btn:hover {
  background: var(--tint);
  color: var(--ink);
  border-color: var(--divider);
}
.icon-btn svg { width: 16px; height: 16px; }
.icon-btn.spinning svg { animation: spin 700ms linear infinite; }

/* =========================================================
   PERIOD STRIP — progress through 32-day window
   ========================================================= */
.period-strip {
  padding: 20px 0 0 0;
  margin-bottom: 0;
  display: flex;
  align-items: center;
  gap: 16px;
  animation: slideDown 600ms cubic-bezier(0.16, 1, 0.3, 1) 60ms both;
}
.period-text {
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.period-track {
  flex: 1;
  height: 2px;
  background: var(--hairline);
  border-radius: 1px;
  overflow: hidden;
  position: relative;
}
.period-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  border-radius: 1px;
  transition: width 1200ms cubic-bezier(0.16, 1, 0.3, 1);
}
.period-marker {
  position: absolute;
  top: -3px;
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  transform: translateX(-50%);
  opacity: 0;
  transition: opacity 400ms 1200ms ease, left 1200ms cubic-bezier(0.16, 1, 0.3, 1);
}
.period-marker.show { opacity: 1; }

/* =========================================================
   FILTER BAR — pill-style segmented controls
   ========================================================= */
.filter-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 32px 0 0;
  margin-top: 24px;
  border-top: 1px solid var(--hairline);
  flex-wrap: wrap;
  animation: slideUp 600ms cubic-bezier(0.16, 1, 0.3, 1) 120ms both;
}
.filter-group { display: flex; align-items: center; gap: 12px; }
.filter-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
}
.segmented {
  display: inline-flex;
  background: var(--tint);
  border-radius: 10px;
  padding: 3px;
  gap: 0;
  border: 1px solid var(--hairline);
}
.segmented button {
  background: transparent;
  border: none;
  color: var(--slate);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: 7px;
  cursor: pointer;
  transition: all 200ms ease;
  letter-spacing: 0.01em;
}
.segmented button:hover { color: var(--ink); }
.segmented button.active {
  background: var(--card);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.date-input {
  background: var(--card);
  border: 1px solid var(--hairline);
  color: var(--ink);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 160ms ease;
}
.date-input:hover { border-color: var(--divider); }
.date-input:focus { outline: none; border-color: var(--accent); }
.date-input[disabled] { opacity: 0.4; cursor: not-allowed; }

/* =========================================================
   SECTION HEADER — small caps, letter-spaced
   ========================================================= */
.section {
  margin-top: 64px;
  animation: fadeIn 700ms cubic-bezier(0.16, 1, 0.3, 1) both;
}
.section-head {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 32px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--hairline);
}

/* =========================================================
   HERO — the one number that matters most
   ========================================================= */
.hero {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 64px;
  align-items: end;
}
@media (max-width: 768px) {
  .hero { grid-template-columns: 1fr; gap: 32px; }
}
.hero-left .hero-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.hero-left .hero-number {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: clamp(80px, 14vw, 168px);
  line-height: 0.9;
  letter-spacing: -0.04em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.hero-left .hero-caption {
  font-size: 13px;
  color: var(--slate);
  margin-top: 12px;
  letter-spacing: 0.01em;
}
.hero-right {
  display: flex;
  flex-direction: column;
  gap: 0;
  padding-bottom: 24px;
}
.hero-breakdown-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: baseline;
  gap: 16px;
  padding: 20px 0;
  border-top: 1px solid var(--hairline);
}
.hero-breakdown-row:last-child { border-bottom: 1px solid var(--hairline); }
.hbr-label { font-size: 14px; color: var(--graphite); font-weight: 400; }
.hbr-num {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}
.hbr-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--slate);
  min-width: 44px;
  text-align: right;
}

/* =========================================================
   PERFORMANCE STRIP — secondary KPIs
   ========================================================= */
.perf-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 48px;
}
@media (max-width: 768px) {
  .perf-grid { grid-template-columns: 1fr; gap: 32px; }
}
.perf-tile .label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.perf-tile .num {
  font-family: 'Fraunces', serif;
  font-size: 56px;
  font-weight: 300;
  line-height: 1;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
}
.perf-tile.accent .num { color: var(--accent); }
.perf-tile .hint {
  font-size: 12px;
  color: var(--slate);
  margin-top: 10px;
  letter-spacing: 0.01em;
}

/* =========================================================
   LOCATION TABLE — clean, hairlines only
   ========================================================= */
.loc-table {
  width: 100%;
  border-collapse: collapse;
}
.loc-table th, .loc-table td {
  text-align: right;
  padding: 20px 16px;
  font-variant-numeric: tabular-nums;
  border-bottom: 1px solid var(--hairline);
}
.loc-table th {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
}
.loc-table td {
  font-size: 18px;
  font-weight: 400;
  color: var(--ink);
}
.loc-table th:first-child, .loc-table td:first-child { text-align: left; }
.loc-table td:first-child {
  font-size: 15px;
  color: var(--ink);
  font-weight: 500;
}
.loc-table td:first-child .loc-full {
  display: block;
  font-size: 12px;
  color: var(--muted);
  font-weight: 400;
  margin-top: 4px;
}
.loc-table .total-col { color: var(--accent); font-weight: 500; }
.loc-table tbody tr.inactive td { opacity: 0.4; }
.loc-table tbody tr.inactive .status { font-size: 10px; color: var(--muted); }

/* =========================================================
   ESTIMATOR — interactive cards
   ========================================================= */
.estimator {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
}
@media (max-width: 768px) { .estimator { grid-template-columns: 1fr; gap: 32px; } }

.est-side .est-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 24px;
}
.est-inputs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 32px;
}
.est-input-cell {
  padding: 16px 0;
  border-top: 1px solid var(--hairline);
}
.est-input-cell .ic-label {
  font-size: 11px;
  color: var(--slate);
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}
.est-input-cell .ic-value {
  font-family: 'Fraunces', serif;
  font-size: 32px;
  font-weight: 400;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  line-height: 1;
}
.est-input-cell.editable {
  cursor: pointer;
  position: relative;
}
.est-input-cell.editable .ic-value {
  color: var(--accent);
  border-bottom: 2px dashed var(--accent);
  display: inline-block;
  padding-bottom: 4px;
  transition: all 160ms ease;
}
.est-input-cell.editable:hover .ic-value {
  border-bottom-style: solid;
}
.rate-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--hairline);
  border-radius: 2px;
  margin-top: 14px;
  outline: none;
}
.rate-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid var(--paper);
  box-shadow: 0 0 0 1px var(--accent);
}
.rate-slider::-moz-range-thumb {
  width: 12px;
  height: 12px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid var(--paper);
  box-shadow: 0 0 0 1px var(--accent);
}
.est-output {
  padding: 32px 0 0;
  border-top: 1px solid var(--divider);
}
.est-output .eo-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.est-output .eo-number {
  font-family: 'Fraunces', serif;
  font-size: clamp(56px, 8vw, 88px);
  font-weight: 300;
  line-height: 1;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}
.est-output.applications .eo-number { color: var(--accent); }
.est-output.footfall .eo-number { color: var(--ink); }

/* =========================================================
   FUNNEL — visual flow
   ========================================================= */
.funnel {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  align-items: stretch;
}
@media (max-width: 768px) { .funnel { grid-template-columns: 1fr 1fr; } }
.funnel-stage {
  padding: 28px 24px;
  background: var(--card);
  border: 1px solid var(--hairline);
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 180px;
}
.funnel-stage:hover { border-color: var(--divider); transition: border-color 200ms ease; }
.funnel-stage .step {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--muted);
}
.funnel-stage .stage-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--slate);
  text-transform: uppercase;
  margin-top: 8px;
}
.funnel-stage .stage-num {
  font-family: 'Fraunces', serif;
  font-size: 48px;
  font-weight: 300;
  line-height: 1;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
  margin: 16px 0 8px;
}
.funnel-stage .stage-conv {
  font-size: 11px;
  color: var(--slate);
  letter-spacing: 0.02em;
}
.funnel-stage.accent .stage-num { color: var(--accent); }
.funnel-stage.success .stage-num { color: var(--success); }

.funnel-tail {
  margin-top: 32px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 24px;
  padding: 32px;
  background: var(--tint);
  border-radius: 16px;
}
@media (max-width: 768px) { .funnel-tail { grid-template-columns: 1fr; gap: 16px; padding: 24px; } }
.tail-cell .tc-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.tail-cell .tc-num {
  font-family: 'Fraunces', serif;
  font-size: 40px;
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.tail-cell.editable .tc-num {
  color: var(--accent);
  cursor: pointer;
  border-bottom: 2px dashed var(--accent);
  display: inline-block;
  padding-bottom: 4px;
}
.tail-cell.success .tc-num { color: var(--success); }

/* =========================================================
   DAILY TREND — pure CSS bar chart, no libraries
   ========================================================= */
.trend-chart {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 240px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--hairline);
  position: relative;
}
.trend-day {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  position: relative;
  cursor: pointer;
  min-width: 0;
}
.trend-bar-stack {
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  height: 100%;
  position: relative;
}
.trend-bar {
  width: 100%;
  background: var(--ink);
  border-radius: 2px 2px 0 0;
  transition: opacity 200ms ease, transform 200ms ease;
  min-height: 0;
}
.trend-bar.ch { background: var(--accent); }
.trend-bar.nch { background: var(--ink); border-radius: 2px 2px 0 0; }
.trend-bar.ch:not(:first-child) { border-radius: 0; }
.trend-day:hover .trend-bar { opacity: 0.7; }
.trend-day:hover .trend-bar.ch, .trend-day:hover .trend-bar.nch { opacity: 1; transform: scaleX(1.4); }

.trend-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: var(--ink);
  color: var(--paper);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 11px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: all 160ms ease;
  z-index: 10;
  box-shadow: var(--shadow-md);
}
.trend-tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: var(--ink);
}
.trend-day:hover .trend-tooltip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.trend-tooltip .tt-date { font-weight: 600; letter-spacing: 0.04em; margin-bottom: 4px; }
.trend-tooltip .tt-row { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.8; }

.trend-axis {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}

/* =========================================================
   PRIZE SPLIT — horizontal bars
   ========================================================= */
.prize-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.prize-row {
  display: grid;
  grid-template-columns: 200px 1fr 60px;
  gap: 24px;
  align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid var(--hairline);
}
@media (max-width: 768px) {
  .prize-row { grid-template-columns: 1fr 50px; }
  .prize-row .prize-bar-track { display: none; }
}
.prize-row .prize-label {
  font-size: 14px;
  color: var(--ink);
  font-weight: 400;
}
.prize-bar-track {
  height: 6px;
  background: var(--hairline);
  border-radius: 3px;
  position: relative;
  overflow: hidden;
}
.prize-bar-fill {
  height: 100%;
  background: var(--ink);
  border-radius: 3px;
  width: 0;
  transition: width 800ms cubic-bezier(0.16, 1, 0.3, 1);
}
.prize-row.top .prize-bar-fill { background: var(--accent); }
.prize-row.zero { opacity: 0.35; }
.prize-count {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 400;
  text-align: right;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}

/* =========================================================
   DATA QUALITY — flagging issues
   ========================================================= */
.dq-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
@media (max-width: 768px) { .dq-grid { grid-template-columns: 1fr 1fr; } }
.dq-cell {
  padding: 24px;
  background: var(--card);
  border: 1px solid var(--hairline);

}
.dq-cell .dq-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.dq-cell .dq-num {

  font-size: 36px;

}
.dq-cell.has-issue .dq-num { color: var(--danger); }
.dq-cell.clean .dq-num { color: var(--success); }

/* =========================================================

.foot {

}

/* =========================================================

   ========================================================= */
.loading {

}
.loading-dot {

}

/* =========================================================

   ========================================================= */
.error-state {

  border-radius: 12px;
  color: var(--danger);
  font-size: 14px;
  margin: 32px 0;
}
.error-state h3 {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  margin-bottom: 12px;
  font-weight: 500;
}
.error-state pre {

  font-size: 11px;
  background: var(--card);
  padding: 12px;
  border-radius: 6px;

}

/* =========================================================
   ANIMATIONS
   ========================================================= */
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.4); }
}

.fade-in { animation: fadeIn 600ms cubic-bezier(0.16, 1, 0.3, 1) both; }

/* =========================================================
   PRINT
   ========================================================= */
@media print {
  .toggle-row, .icon-btn { display: none !important; }
  body { background: white !important; color: black !important; }
}

<body data-theme="light">

<div id="root">
  <div class="loading">
    <div class="loading-dot"></div>
    <div class="loading-label">Loading activation data</div>
  </div>
</div>

<script>
// =============================================================
// CONFIG — paste your Apps Script Web App URL here
// =============================================================
const CONFIG = {
  // Replace this with your deployed Apps Script Web App URL (ends in /exec)
  API_URL: 'https://script.google.com/macros/s/AKfycbx9lbe2RSTHSxL8A4whuzQN9rukupQp2LfGZiW_bTCKqT_yzn3Yb3x0oKEmSyUJNpIHwg/exec',
  REFRESH_INTERVAL_MS: 5 * 60 * 1000   // auto-refresh every 5 minutes
};

// =============================================================
// STATE
// =============================================================
const state = {
  raw: null,
  filters: {
    mode: 'all',        // 'all' | 'today' | 'date'
    date: null,         // YYYY-MM-DD string when mode='date'
    location: 'all'     // 'all' | 'MoE' | 'DCC' | 'MCC'
  },
  rates: {
    signup: 0.15,
    lead: 0.30
  },
  theme: 'light'
};

// =============================================================
// UTILS
// =============================================================
const fmt = {
  num: n => Number(n || 0).toLocaleString('en-US'),
  pct: n => `${Math.round(n * 100)}%`,
  date: iso => {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  },
  shortDate: iso => {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
  },
  timestamp: iso => {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleString('en-GB', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: false
    });
  }
};

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function daysBetween(startISO, endISO) {
  const a = new Date(startISO + 'T00:00:00');
  const b = new Date(endISO + 'T00:00:00');
  return Math.round((b - a) / 86400000);
}

function eachDate(startISO, endISO) {
  const out = [];
  let d = new Date(startISO + 'T00:00:00');
  const end = new Date(endISO + 'T00:00:00');
  while (d <= end) {
    out.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
    d.setDate(d.getDate() + 1);
  }
  return out;
}

// =============================================================
// DATA TRANSFORM — apply filters
// =============================================================
function applyFilters(raw, filters) {
  if (!raw) return null;

  let activeDate = null;
  if (filters.mode === 'today') activeDate = todayISO();
  else if (filters.mode === 'date') activeDate = filters.date;

  const matchRow = r => {
    if (filters.location !== 'all' && r.location !== filters.location) return false;
    if (activeDate && r.date !== activeDate) return false;
    return true;
  };

  return {
    cardHolders: raw.cardHolders.filter(matchRow),
    nonCardHolders: raw.nonCardHolders.filter(matchRow),
    activeDate,
    dateFilterOn: !!activeDate,
    locationFilterOn: filters.location !== 'all'
  };
}

// =============================================================
// COMPUTE METRICS from filtered data
// =============================================================
function computeMetrics(filtered) {
  if (!filtered) return null;
  const ch = filtered.cardHolders;
  const nch = filtered.nonCardHolders;
  const applied = nch.filter(r => r.applied === 'Y').length;
  const voucher = nch.filter(r => r.voucher === 'Y').length;
  const prizesCh = ch.filter(r => r.prize).length;
  const prizesNch = nch.filter(r => r.prize).length;
  return {
    cardHolders: ch.length,
    nonCardHolders: nch.length,
    footfall: ch.length + nch.length,
    applied: applied,
    vouchers: voucher,
    prizes: prizesCh + prizesNch
  };
}

// =============================================================
// LOCATION SPLIT — always all 3, respects date filter but not location
// =============================================================
function locationSplit(raw, filters) {
  const locs = ['MoE', 'DCC', 'MCC'];
  let activeDate = null;
  if (filters.mode === 'today') activeDate = todayISO();
  else if (filters.mode === 'date') activeDate = filters.date;

  return locs.map(loc => {
    const inLoc = r => r.location === loc && (!activeDate || r.date === activeDate);
    const ch = raw.cardHolders.filter(inLoc);
    const nch = raw.nonCardHolders.filter(inLoc);
    return {
      code: loc,
      fullName: raw.period.locations[loc].fullName,
      start: raw.period.locations[loc].start,
      end: raw.period.locations[loc].end,
      cardHolders: ch.length,
      nonCardHolders: nch.length,
      total: ch.length + nch.length,
      applied: nch.filter(r => r.applied === 'Y').length,
      vouchers: nch.filter(r => r.voucher === 'Y').length
    };
  });
}

// =============================================================
// DAILY TIMELINE — always all days, ignores filters
// =============================================================
function dailyTimeline(raw) {
  const dates = eachDate(raw.period.start, raw.period.end);
  return dates.map(d => {
    const ch = raw.cardHolders.filter(r => r.date === d).length;
    const nch = raw.nonCardHolders.filter(r => r.date === d).length;
    return { date: d, cardHolders: ch, nonCardHolders: nch, total: ch + nch };
  });
}

// =============================================================
// PRIZE SPLIT — respects filters
// =============================================================
function prizeSplit(filtered) {
  const categories = [
    { label: 'Gold Coin (10g)',        pattern: /gold coin \(10g\)/i },
    { label: 'Gold Coin (5g)',         pattern: /gold coin \(5g\)/i },
    { label: 'AED 2,500 SHARE Points', pattern: /aed 2,500/i },
    { label: 'AED 1,000 SHARE Points', pattern: /aed 1,000/i },
    { label: 'AED 500 SHARE Points',   pattern: /aed 500/i },
    { label: 'AED 250 SHARE Points',   pattern: /aed 250/i },
    { label: 'AED 100 SHARE Points',   pattern: /aed 100/i },
    { label: 'Carrefour Prizes',       pattern: /carrefour/i },
    { label: 'Lululemon Voucher',      pattern: /lululemon/i },
    { label: 'LEGO Set',               pattern: /lego/i },
    { label: 'Psycho Bunny Voucher',   pattern: /psycho bunny/i },
    { label: 'AllSaints Voucher',      pattern: /allsaints/i }
  ];
  const all = [
    ...filtered.cardHolders.map(r => r.prize),
    ...filtered.nonCardHolders.map(r => r.prize)
  ].filter(Boolean);

  return categories.map(c => ({
    label: c.label,
    count: all.filter(p => c.pattern.test(p)).length
  })).sort((a, b) => b.count - a.count);
}

// =============================================================
// RENDER — full dashboard HTML
// =============================================================
function render() {
  const raw = state.raw;
  if (!raw) return;

  const filtered = applyFilters(raw, state.filters);
  const m = computeMetrics(filtered);
  const locs = locationSplit(raw, state.filters);
  const daily = dailyTimeline(raw);
  const prizes = prizeSplit(filtered);

  // Period progress
  const periodStart = raw.period.start;
  const periodEnd = raw.period.end;
  const totalDays = daysBetween(periodStart, periodEnd) + 1;
  const today = todayISO();
  const dayOfPeriod = Math.max(1, Math.min(totalDays, daysBetween(periodStart, today) + 1));
  const periodPct = Math.max(0, Math.min(1, dayOfPeriod / totalDays));
  const daysRemaining = Math.max(0, daysBetween(today, periodEnd));

  // Estimator math (always against unfiltered NCH data — projections need full population)
  const allNch = raw.nonCardHolders.length;
  const daysSinceStart = Math.max(1, daysBetween(periodStart, today) + 1);
  const avgDailyNch = allNch / daysSinceStart;
  const totalApplied = raw.nonCardHolders.filter(r => r.applied === 'Y').length;
  const projectedApplications = Math.round(totalApplied + (avgDailyNch * daysRemaining * state.rates.signup));
  const totalFootfall = raw.cardHolders.length + raw.nonCardHolders.length;
  const avgDailyFootfall = totalFootfall / daysSinceStart;
  const projectedFootfall = Math.round(totalFootfall + (avgDailyFootfall * daysRemaining));
  const estCardsIssued = Math.round(totalApplied * state.rates.lead);
  const remainingLeads = allNch - totalApplied;
  const additionalCardsFromLeads = Math.round(remainingLeads * state.rates.lead);

  // Date for date input min/max
  const periodDates = eachDate(periodStart, periodEnd);
  const dq = raw.dataQuality;

  // Filter labels for "Viewing" strip
  const viewLabel = state.filters.mode === 'all' ? 'All-time cumulative' :
                    state.filters.mode === 'today' ? `Today · ${fmt.date(today)}` :
                    `Date · ${fmt.date(state.filters.date)}`;
  const locLabel = state.filters.location === 'all' ? 'All locations' : state.filters.location;

  // Compute prize bars max for scaling
  const maxPrize = Math.max(1, ...prizes.map(p => p.count));

  // Compute trend bars max for scaling
  const maxDay = Math.max(1, ...daily.map(d => d.total));

  // SVG icons
  const SUN_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;
  const MOON_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;
  const REFRESH_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.41-6.36L23 10"/><path d="M23 4v6h-6"/><path d="M21 12a9 9 0 0 1-15.41 6.36L1 14"/><path d="M1 20v-6h6"/></svg>`;

  const html = `
  <div class="shell">

    <header class="top">
      <div class="brand-block">
        <div class="title">SHARE Anniversary</div>
        <div class="subtitle">Activation Performance Read-Out</div>
      </div>
      <div class="meta-block">
        <div class="partners">ENBD · Visa · MAF</div>
        <div class="timestamp">Live · ${fmt.timestamp(raw.generatedAt)}</div>
        <div class="toggle-row">
          <button class="icon-btn" id="refreshBtn" title="Refresh data">${REFRESH_ICON}</button>

        <div class="period-fill" style="width: ${periodPct * 100}%"></div>
        <div class="period-marker show" style="left: ${periodPct * 100}%"></div>
      </div>
      <div class="period-text" style="color: var(--muted)">${fmt.pct(periodPct)} complete</div>
    </div>

    <div class="filter-bar">
      <div class="filter-group">
        <span class="filter-label">View</span>

          <button class="${state.filters.mode === 'all' ? 'active' : ''}" data-mode="all">All-time</button>
          <button class="${state.filters.mode === 'today' ? 'active' : ''}" data-mode="today">Today</button>

          </div>
          <div class="hero-breakdown-row">
            <div class="hbr-label">Non-Cardholders</div>
            <div class="hbr-num">${fmt.num(m.nonCardHolders)}</div>

          </div>
        </div>
      </div>
    </section>

    <!-- PERFORMANCE -->

        </div>
        <div class="perf-tile">
          <div class="label">Vouchers Issued</div>
          <div class="num">${fmt.num(m.vouchers)}</div>
          <div class="hint">${m.applied ? fmt.pct(m.vouchers / Math.max(1, m.applied)) + ' issued vs. applied' : 'No applications yet'}</div>
        </div>
        <div class="perf-tile">
          <div class="label">Prizes Given</div>
          <div class="num">${fmt.num(m.prizes)}</div>
          <div class="hint">${m.footfall ? fmt.pct(m.prizes / m.footfall) + ' of footfall' : '—'}</div>
        </div>

    <!-- BY LOCATION -->
    <section class="section">

        <tbody>

            return `
            <tr class="${hasStarted ? '' : 'inactive'}">
              <td>
                <strong>${l.code}</strong>
                <span class="loc-full">${l.fullName}${!hasStarted ? ` · opens ${fmt.shortDate(l.start)}` : (isLive ? ' · live now' : ` · closed ${fmt.shortDate(l.end)}`)}</span>
              </td>

              <td>${fmt.num(l.nonCardHolders)}</td>
              <td class="total-col">${fmt.num(l.total)}</td>
              <td>${fmt.num(l.applied)}</td>
              <td>${fmt.num(l.vouchers)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </section>

    <!-- SIGN-UP ESTIMATOR -->
    <section class="section">
      <div class="section-head">Sign-Up Estimator</div>
      <div class="estimator">
        <div class="est-side">
          <div class="est-label">Projected Final Applications</div>
          <div class="est-inputs">
            <div class="est-input-cell">
              <div class="ic-label">Avg Daily Non-CH</div>
              <div class="ic-value">${Math.round(avgDailyNch).toLocaleString()}</div>

              <div class="ic-value">${daysRemaining}</div>

              <div class="ic-label">Sign-up Rate · drag to adjust</div>
              <div class="ic-value" id="signupRateLabel">${fmt.pct(state.rates.signup)}</div>
              <input type="range" class="rate-slider" id="signupSlider" min="0" max="100" value="${state.rates.signup * 100}" step="1" />
            </div>
            <div class="est-input-cell">
              <div class="ic-label">Already Applied</div>
              <div class="ic-value">${fmt.num(totalApplied)}</div>
            </div>
          </div>
          <div class="est-output applications">
            <div class="eo-label">→ Projected Total Applications</div>
            <div class="eo-number" id="projectedApps">${fmt.num(projectedApplications)}</div>
          </div>
        </div>

          <div class="est-label">Projected Final Footfall</div>
          <div class="est-inputs">
            <div class="est-input-cell">
              <div class="ic-label">Avg Daily Footfall</div>
              <div class="ic-value">${Math.round(avgDailyFootfall).toLocaleString()}</div>

              <div class="ic-label">Days Remaining</div>
              <div class="ic-value">${daysRemaining}</div>
            </div>

              <div class="ic-label">Current Total</div>

              <div class="ic-label">Days Elapsed</div>
              <div class="ic-value">${daysSinceStart}</div>
            </div>
          </div>
          <div class="est-output footfall">
            <div class="eo-label">→ Projected Total Footfall</div>
            <div class="eo-number">${fmt.num(projectedFootfall)}</div>
          </div>
        </div>

    <!-- ACQUISITION FUNNEL -->

          <div>
            <div class="stage-num">${fmt.num(totalFootfall)}</div>

            <div class="stage-conv">entry point</div>
          </div>
        </div>
        <div class="funnel-stage">
          <div class="step">02</div>
          <div>
            <div class="stage-num">${fmt.num(allNch)}</div>
            <div class="stage-label">Non-Cardholders</div>
            <div class="stage-conv">${totalFootfall ? fmt.pct(allNch / totalFootfall) : '—'} of footfall</div>
          </div>
        </div>
        <div class="funnel-stage accent">
          <div class="step">03</div>
          <div>
            <div class="stage-num">${fmt.num(totalApplied)}</div>
            <div class="stage-label">Applied</div>
            <div class="stage-conv">${allNch ? fmt.pct(totalApplied / allNch) : '—'} of non-CH applied</div>
          </div>
        </div>
        <div class="funnel-stage success">
          <div class="step">04</div>
          <div>
            <div class="stage-num">${fmt.num(estCardsIssued)}</div>
            <div class="stage-label">Est. Cards Issued</div>
            <div class="stage-conv">at ${fmt.pct(state.rates.lead)} lead conversion</div>
          </div>
        </div>
      </div>

      <div class="funnel-tail">
        <div class="tail-cell">
          <div class="tc-label">Remaining Leads</div>
          <div class="tc-num">${fmt.num(remainingLeads)}</div>
        </div>
        <div class="tail-cell editable">
          <div class="tc-label">Lead-to-Card Rate · drag</div>
          <div class="tc-num" id="leadRateLabel">${fmt.pct(state.rates.lead)}</div>
          <input type="range" class="rate-slider" id="leadSlider" min="0" max="100" value="${state.rates.lead * 100}" step="1" />
        </div>
        <div class="tail-cell success">
          <div class="tc-label">Additional Cards Potential</div>
          <div class="tc-num">${fmt.num(additionalCardsFromLeads)}</div>
        </div>
      </div>
    </section>

    <!-- DAILY TREND -->
    <section class="section">
      <div class="section-head">Daily Trend</div>
      <div class="trend-chart">
        ${daily.map((d, i) => {
          const isPast = d.date <= today;
          const pinkPct = maxDay ? (d.cardHolders / maxDay) * 100 : 0;
          const inkPct = maxDay ? (d.nonCardHolders / maxDay) * 100 : 0;
          return `
            <div class="trend-day">
              <div class="trend-tooltip">
                <div class="tt-date">${fmt.date(d.date)}</div>
                <div class="tt-row">CH ${fmt.num(d.cardHolders)} · NCH ${fmt.num(d.nonCardHolders)}</div>
                <div class="tt-row">Total ${fmt.num(d.total)}</div>
              </div>
              <div class="trend-bar-stack">
                ${inkPct > 0 ? `<div class="trend-bar nch" style="height: ${inkPct}%; opacity: ${isPast ? 1 : 0.2}"></div>` : ''}
                ${pinkPct > 0 ? `<div class="trend-bar ch" style="height: ${pinkPct}%; opacity: ${isPast ? 1 : 0.2}"></div>` : ''}
              </div>
            </div>
          `;
        }).join('')}
      </div>
      <div class="trend-axis">
        <span>${fmt.shortDate(daily[0].date)}</span>
        <span>${fmt.shortDate(daily[Math.floor(daily.length / 2)].date)}</span>
        <span>${fmt.shortDate(daily[daily.length - 1].date)}</span>
      </div>
    </section>

    <!-- PRIZE SPLIT -->
    <section class="section">
      <div class="section-head">Prize Split</div>
      <div class="prize-list">
        ${prizes.map((p, i) => `
          <div class="prize-row ${i < 3 && p.count > 0 ? 'top' : ''} ${p.count === 0 ? 'zero' : ''}">
            <div class="prize-label">${p.label}</div>
            <div class="prize-bar-track">
              <div class="prize-bar-fill" style="width: ${(p.count / maxPrize) * 100}%"></div>
            </div>
            <div class="prize-count">${fmt.num(p.count)}</div>
          </div>
        `).join('')}
      </div>
    </section>

    <!-- DATA QUALITY -->
    <section class="section">
      <div class="section-head">Data Quality</div>
      <div class="dq-grid">
        <div class="dq-cell ${dq.missingLocation > 0 ? 'has-issue' : 'clean'}">
          <div class="dq-label">Missing Location</div>
          <div class="dq-num">${fmt.num(dq.missingLocation)}</div>
        </div>
        <div class="dq-cell ${dq.missingDate > 0 ? 'has-issue' : 'clean'}">
          <div class="dq-label">Missing Date</div>
          <div class="dq-num">${fmt.num(dq.missingDate)}</div>
        </div>
        <div class="dq-cell ${dq.locationTypos > 0 ? 'has-issue' : 'clean'}">
          <div class="dq-label">Location Typos</div>
          <div class="dq-num">${fmt.num(dq.locationTypos)}</div>
        </div>
        <div class="dq-cell ${dq.duplicates > 0 ? 'has-issue' : 'clean'}">
          <div class="dq-label">Duplicates Flagged</div>
          <div class="dq-num">${fmt.num(dq.duplicates)}</div>
        </div>
      </div>
    </section>

    <footer class="foot">
      <div>Emirates NBD SHARE Visa Credit Card · Anniversary Activation</div>
      <div>15 May – 15 June 2026</div>
    </footer>

  </div>
  `;

  document.getElementById('root').innerHTML = html;
  attachHandlers();
}

// =============================================================
// EVENT HANDLERS
// =============================================================
function attachHandlers() {
  // Theme toggle
  document.getElementById('themeBtn').addEventListener('click', () => {
    state.theme = state.theme === 'light' ? 'dark' : 'light';
    document.body.setAttribute('data-theme', state.theme);
    localStorage.setItem('share-dashboard-theme', state.theme);
    render();
  });

  // Refresh
  document.getElementById('refreshBtn').addEventListener('click', () => {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    fetchData().finally(() => {
      setTimeout(() => btn.classList.remove('spinning'), 400);
    });
  });

  // View mode segment
  document.getElementById('modeSegment').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      state.filters.mode = b.dataset.mode;
      if (state.filters.mode === 'date' && !state.filters.date) {
        state.filters.date = state.raw.period.start;
      }
      render();
    });
  });

  // Location segment
  document.getElementById('locSegment').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      state.filters.location = b.dataset.loc;
      render();
    });
  });

  // Date input
  document.getElementById('dateInput').addEventListener('change', e => {
    state.filters.date = e.target.value;
    if (state.filters.mode !== 'date') state.filters.mode = 'date';
    render();
  });

  // Signup rate slider
  const signupSlider = document.getElementById('signupSlider');
  if (signupSlider) {
    signupSlider.addEventListener('input', e => {
      state.rates.signup = parseInt(e.target.value) / 100;
      document.getElementById('signupRateLabel').textContent = fmt.pct(state.rates.signup);
      // recompute projected apps without full re-render for smoothness
      updateProjections();
    });
    signupSlider.addEventListener('change', () => render());
  }

  // Lead rate slider
  const leadSlider = document.getElementById('leadSlider');
  if (leadSlider) {
    leadSlider.addEventListener('input', e => {
      state.rates.lead = parseInt(e.target.value) / 100;
      document.getElementById('leadRateLabel').textContent = fmt.pct(state.rates.lead);
      updateProjections();
    });
    leadSlider.addEventListener('change', () => render());
  }
}

function updateProjections() {
  // Lightweight live update during slider drag
  const raw = state.raw;
  if (!raw) return;
  const periodStart = raw.period.start;
  const periodEnd = raw.period.end;
  const today = todayISO();
  const daysRemaining = Math.max(0, daysBetween(today, periodEnd));
  const daysSinceStart = Math.max(1, daysBetween(periodStart, today) + 1);
  const allNch = raw.nonCardHolders.length;
  const avgDailyNch = allNch / daysSinceStart;
  const totalApplied = raw.nonCardHolders.filter(r => r.applied === 'Y').length;
  const projected = Math.round(totalApplied + (avgDailyNch * daysRemaining * state.rates.signup));
  const el = document.getElementById('projectedApps');
  if (el) el.textContent = fmt.num(projected);
}

// =============================================================
// FETCH
// =============================================================
async function fetchData() {
  try {
    if (CONFIG.API_URL.includes('PASTE_YOUR')) {
      throw new Error('API_URL not configured. Open this file in a text editor and set CONFIG.API_URL to your deployed Apps Script Web App URL.');
    }
    const res = await fetch(CONFIG.API_URL);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    state.raw = data;
    render();
  } catch (err) {
    document.getElementById('root').innerHTML = `
      <div class="shell">
        <div class="error-state">
          <h3>Couldn't load dashboard data</h3>
          <div>${err.message}</div>
          <pre>${err.stack || ''}</pre>
        </div>
      </div>
    `;
  }
}

// =============================================================
// INIT
// =============================================================
const savedTheme = localStorage.getItem('share-dashboard-theme');
if (savedTheme) {
  state.theme = savedTheme;
  document.body.setAttribute('data-theme', savedTheme);
}

fetchData();
setInterval(fetchData, CONFIG.REFRESH_INTERVAL_MS);

</script>
</body>
</html>
