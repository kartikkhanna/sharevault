  const reportTitle = `SHARE Vault · Daily Performance Report`;
  const reportDate = new Date(todayStr + 'T00:00:00').toLocaleDateString('en-GB', {
    weekday: 'long', day: '2-digit', month: 'long', year: 'numeric'
  });

  return `
    <div class="report-wrap">
      <div class="report-header">
        <div class="report-header-left">
          <div class="report-title">${reportTitle}</div>
          <div class="report-subtitle">Emirates NBD × Visa × SHARE · ${reportDate}</div>
        </div>
        <div class="report-header-right">
          <div class="report-partners">ENBD · VISA · SHARE</div>
        </div>
      </div>

      ${buildReportBlock(raw, 'Overall', 'total', dates, null)}
      ${buildReportBlock(raw, 'MOE', 'MoE', dates, '2026-05-15')}
      ${buildReportBlock(raw, 'DCC', 'DCC', dates, '2026-05-23')}
      ${buildReportBlock(raw, 'MCC', 'MCC', dates, '2026-06-01')}

      <div class="report-footer">
        Activation period: 15-May → 15-Jun · Generated ${new Date().toLocaleString('en-GB', {day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'})}
      </div>
    </div>
  `;
}

// Generate the PNG and trigger download + share
async function generateAndShareReport() {
  if (!state.raw) {
    showToast('Dashboard data not loaded yet', 'error', 3000);
    return;
  }

  const btn = document.getElementById('reportBtn');
  if (btn) {
    btn.classList.add('spinning');
    btn.disabled = true;
  }
  showToast('Generating report…', 'info', 0);

  try {
    // Create a hidden container, render the report into it, snapshot, then remove
    const container = document.createElement('div');
    container.id = 'report-render-target';
    container.style.cssText = 'position: fixed; left: -10000px; top: 0; width: auto; background: white; padding: 32px; font-family: Poppins, sans-serif;';
    container.innerHTML = buildReportHtml(state.raw);
    document.body.appendChild(container);

    // Wait a tick for fonts/layout
    await new Promise(r => setTimeout(r, 100));

    const target = container.querySelector('.report-wrap');
    const canvas = await html2canvas(target, {
      scale: 2,         // 2x for retina/sharp output
      backgroundColor: '#ffffff',
      logging: false,
      useCORS: true
    });

    document.body.removeChild(container);

    // Convert to blob
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    const filename = `SHARE_Vault_Report_${todayISO()}.png`;

    // Try native Share API first (mobile + modern desktop browsers)
    if (navigator.share && navigator.canShare) {
      const file = new File([blob], filename, {type: 'image/png'});
      if (navigator.canShare({files: [file]})) {
        try {
          await navigator.share({
            files: [file],
            title: 'SHARE Vault Daily Report',
            text: `SHARE Vault performance — ${new Date().toLocaleDateString('en-GB', {day: '2-digit', month: 'long', year: 'numeric'})}`
          });
          showToast('Report shared', 'success', 2500);
          return;
        } catch (shareErr) {
          // User cancelled the share sheet or share failed — fall through to download
          if (shareErr.name === 'AbortError') {
            showToast('Share cancelled', 'info', 2000);
            return;
          }
          console.warn('Share failed, falling back to download:', shareErr);
        }
      }
    }

    // Fallback — download the PNG
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Report downloaded · attach to WhatsApp manually', 'success', 4000);

  } catch (err) {
    console.error('Report generation failed:', err);
    showToast('Report generation failed: ' + err.message, 'error', 5000);
  } finally {
    if (btn) {
      btn.classList.remove('spinning');
      btn.disabled = false;
    }
  }
}

function attachHandlers() {
  document.getElementById('themeBtn').addEventListener('click', () => {
    state.theme = state.theme === 'light' ? 'dark' : 'light';
    document.body.setAttribute('data-theme', state.theme);
    localStorage.setItem('share-dashboard-theme', state.theme);
    render();
  });

  document.getElementById('syncBtn').addEventListener('click', async () => {
    const btn = document.getElementById('syncBtn');
    if (btn.classList.contains('spinning')) return;

    btn.classList.add('spinning');
    btn.disabled = true;

    showToast('Pulling latest from agency xlsx…', 'info', 0);

    try {
      const separator = CONFIG.API_URL.includes('?') ? '&' : '?';
      const url = CONFIG.API_URL + separator + 'mode=sync&_t=' + Date.now();

      const res = await fetch(url, { cache: 'no-store' });
      const result = await res.json();

      if (result.error) throw new Error(result.error);

      const appended = result.lastSyncAppended || 0;
      const elapsed = result.elapsedSeconds || 0;
      const msg = appended > 0
        ? `Pulled ${appended} new row${appended === 1 ? '' : 's'} in ${elapsed}s`
        : `Already up to date · ${elapsed}s`;
      showToast(msg, 'success', 3000);

      await fetchData();

    } catch (err) {
      console.error('Sync failed:', err);
      showToast('Sync failed: ' + err.message, 'error', 5000);
    } finally {
      setTimeout(() => {
        btn.classList.remove('spinning');
        btn.disabled = false;
      }, 600);
    }
  });

  document.getElementById('refreshBtn').addEventListener('click', () => {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    fetchData().finally(() => { setTimeout(() => btn.classList.remove('spinning'), 500); });
  });

  const reportBtn = document.getElementById('reportBtn');
  if (reportBtn) {
    reportBtn.addEventListener('click', () => {
      generateAndShareReport();
    });
  }

  document.getElementById('modeSegment').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      state.filters.mode = b.dataset.mode;
      if (state.filters.mode === 'date' && !state.filters.date) state.filters.date = state.raw.period.start;
      render();
    });
  });

  document.getElementById('locSegment').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      state.filters.location = b.dataset.loc;
      render();
    });
  });

  document.getElementById('dateInput').addEventListener('change', e => {
    state.filters.date = e.target.value;
    if (state.filters.mode !== 'date') state.filters.mode = 'date';
    render();
  });

  const signupSlider = document.getElementById('signupSlider');
  if (signupSlider) {
    signupSlider.addEventListener('input', e => {
      state.rates.signup = parseInt(e.target.value) / 100;
      document.getElementById('signupRateLabel').textContent = fmt.pct(state.rates.signup);
      updateProjections();
    });
  }
  const leadSlider = document.getElementById('leadSlider');
  if (leadSlider) {
    leadSlider.addEventListener('input', e => {
      state.rates.lead = parseInt(e.target.value) / 100;
      document.getElementById('leadRateLabel').textContent = fmt.pct(state.rates.lead);
      const inlineEl = document.getElementById('leadRateInline');
      if (inlineEl) inlineEl.textContent = fmt.pct(state.rates.lead);
      updateProjections();
    });
  }
  // Approval slider — re-render budget section only (not full dashboard) to preserve slider focus
  const approvalSlider = document.getElementById('approvalSlider');
  if (approvalSlider) {
    approvalSlider.addEventListener('input', e => {
      state.rates.approval = parseInt(e.target.value) / 100;
      document.getElementById('approvalRateLabel').textContent = fmt.pct(state.rates.approval);
      updateBudgetSection();
      updateForecastSection();
    });
  }

  // Forecast section sliders (gift card rate + warm conversion rate)
  attachForecastSliderHandlers();

  // Lever checkboxes — toggle savings impact
  document.querySelectorAll('input[data-lever]').forEach(cb => {
    cb.addEventListener('change', e => {
      const leverId = e.target.dataset.lever;
      state.levers[leverId] = e.target.checked;
      updateForecastSection();
    });
  });
}

// Patch in only the budget section (used when approval slider moves)
function updateBudgetSection() {
  if (!state.raw) return;
  const filtered = applyFilters(state.raw, state.filters);
  const budget = computeBudget(filtered, state.rates.approval);
  const existing = document.querySelector('.span-budget');
  if (!existing) return;
  const wrapper = document.createElement('div');
  wrapper.innerHTML = renderBudgetSection(budget, state.rates.approval);
  existing.replaceWith(wrapper.firstElementChild);
  // Re-attach slider handler since the section was replaced
  const newSlider = document.getElementById('approvalSlider');
  if (newSlider) {
    newSlider.addEventListener('input', e => {
      state.rates.approval = parseInt(e.target.value) / 100;
      document.getElementById('approvalRateLabel').textContent = fmt.pct(state.rates.approval);
      updateBudgetSection();
      updateForecastSection();
    });
  }
}

// Patch in only the forecast section (used when sliders move)
function updateForecastSection() {
  if (!state.raw) return;
  const baselineForecast = addWarmLeadBonus(
    computeForecast(state.raw, state.rates.approval),
    state.raw,
    state.rates.warmConv,
    state.rates.approval
  );
  const tighterForecast = computeTighterRunForecast(state.raw, state.rates.approval, state.rates.giftCard);
  const existing = document.querySelector('.span-forecast');
  if (!existing) return;
  const wrapper = document.createElement('div');
  wrapper.innerHTML = renderForecastSection(baselineForecast, tighterForecast, state.raw, state.rates.approval, state.rates.giftCard, state.rates.warmConv);
  existing.replaceWith(wrapper.firstElementChild);
  attachForecastSliderHandlers();
}

// Attach handlers for the forecast section sliders (approval + gift card + warm)
function attachForecastSliderHandlers() {
  // Approval rate slider (duplicated inside forecast section for convenience)
  const approvalSlider2 = document.getElementById('approvalSlider2');
  if (approvalSlider2) {
    approvalSlider2.addEventListener('input', e => {
      state.rates.approval = parseInt(e.target.value) / 100;
      document.getElementById('approvalRateLabel2').textContent = fmt.pct(state.rates.approval);
      // Also sync the budget section's approval slider if visible
      const otherSlider = document.getElementById('approvalSlider');
      const otherLabel = document.getElementById('approvalRateLabel');
      if (otherSlider) otherSlider.value = e.target.value;
      if (otherLabel) otherLabel.textContent = fmt.pct(state.rates.approval);
      updateBudgetSection();
      updateForecastSection();
    });
  }
  const giftCardSlider = document.getElementById('giftCardSlider');
  if (giftCardSlider) {
    giftCardSlider.addEventListener('input', e => {
      state.rates.giftCard = parseInt(e.target.value) / 100;
      document.getElementById('giftCardRateLabel').textContent = fmt.pct(state.rates.giftCard);
      updateForecastSection();
    });
  }
  const warmSlider = document.getElementById('warmConvSlider');
  if (warmSlider) {
    warmSlider.addEventListener('input', e => {
      state.rates.warmConv = parseInt(e.target.value) / 100;
      document.getElementById('warmConvRateLabel').textContent = fmt.pct(state.rates.warmConv);
      updateForecastSection();
    });
  }
}

function updateProjections() {
  const raw = state.raw;
  if (!raw) return;
  const periodEnd = raw.period.end;
  const periodStart = raw.period.start;
  const today = todayISO();
  const daysRemaining = Math.max(0, daysBetween(today, periodEnd));
  const daysSinceStart = Math.max(1, daysBetween(periodStart, today) + 1);
  const allNch = raw.nonCardHolders.length;
  const avgDailyNch = allNch / daysSinceStart;
  const totalApplied = raw.nonCardHolders.filter(r => r.applied === 'Y').length;
  const proj = Math.round(totalApplied + (avgDailyNch * daysRemaining * state.rates.signup));
  const estIssued = Math.round(totalApplied * state.rates.lead);
  const projEl = document.getElementById('projectedApps');
  if (projEl) projEl.textContent = fmt.num(proj);
  const totalFootfall = raw.cardHolders.length + allNch;
  renderFunnel(totalFootfall, allNch, totalApplied, estIssued);
}

// Lightweight toast notification — used by sync button for live feedback
function showToast(message, type, duration) {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'toast';
  toast.className = 'toast toast-' + (type || 'info');
  toast.textContent = message;
  document.body.appendChild(toast);

  requestAnimationFrame(() => toast.classList.add('toast-visible'));

  if (duration && duration > 0) {
    setTimeout(() => {
      toast.classList.remove('toast-visible');
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }
}

async function fetchData() {
  try {
    if (CONFIG.API_URL.includes('PASTE_YOUR')) {
      throw new Error('API_URL not configured. Open this file in a text editor and set CONFIG.API_URL to your deployed Apps Script Web App URL.');
    }
    const separator = CONFIG.API_URL.includes('?') ? '&' : '?';

    // Always read from agency xlsx (v2). If v2 fails (timeout, transient error),
    // we KEEP whatever data is already on screen rather than falling back to the
    // corrupted live tracker. Stale data is better than wrong data.
    const v2url = CONFIG.API_URL + separator + 'mode=dashboard_v2&_t=' + Date.now();
    const v2controller = new AbortController();
    const v2timeout = setTimeout(() => v2controller.abort(), 45000);  // 45s — xlsx conversion is slow

    try {
      const v2res = await fetch(v2url, { cache: 'no-store', signal: v2controller.signal });
      clearTimeout(v2timeout);
      const v2data = await v2res.json();
      if (v2data.error) throw new Error(v2data.error);

      state.raw = dedupeSourceData(v2data);
      state.lastFetchOk = true;
      state.lastFetchAt = Date.now();
      console.log('Dashboard refresh OK — CH:', v2data.cardHolders?.length, 'NCH:', v2data.nonCardHolders?.length);
      render();

    } catch (v2err) {
      clearTimeout(v2timeout);
      console.warn('Dashboard refresh failed (keeping existing data):', v2err.message);
      state.lastFetchOk = false;
      state.lastFetchFailedAt = Date.now();

      if (!state.raw) {
        // No data on screen yet — show error since we have nothing to display
        document.getElementById('root').innerHTML = `
          <div class="error-state">
            <h3>Couldn't load dashboard data</h3>
            <div>${v2err.message}</div>
            <div style="margin-top: 10px; font-size: 12px;">Auto-retry in 5 minutes. You can also click the refresh button to try again now.</div>
          </div>
        `;
      } else {
        // Data already on screen — just update the timestamp area to indicate the refresh failed
        updateStaleIndicator();
      }
    }
  } catch (outerErr) {
    console.error('Unexpected error in fetchData:', outerErr);
  }
}

// Update the header timestamp area to show a "refresh failed" hint when the latest
// fetch errored. Called on failure and on the periodic 60s timestamp tick.
function updateStaleIndicator() {
  const el = document.querySelector('.meta-block .timestamp');
  if (!el || !state.raw) return;
  const stamp = state.raw.dataLastUpdated || state.raw.generatedAt;
  if (state.lastFetchOk === false) {
    const failedAt = state.lastFetchFailedAt || Date.now();
    const failedAgo = fmt.relativeTime(new Date(failedAt).toISOString());
    el.innerHTML = `<span style="color: var(--warn);">⚠ Refresh failed ${failedAgo}</span> · Data ${fmt.relativeTime(stamp)}`;
    el.title = `Last successful fetch: ${fmt.timestamp(stamp)}. Latest refresh attempt failed — showing previous data.`;
  } else {
    el.textContent = `Data ${fmt.relativeTime(stamp)}`;
    el.title = `Exact: ${fmt.timestamp(stamp)}`;
  }
}

const savedTheme = localStorage.getItem('share-dashboard-theme');
if (savedTheme) {
  state.theme = savedTheme;
  document.body.setAttribute('data-theme', savedTheme);
}

fetchData();
setInterval(fetchData, CONFIG.REFRESH_INTERVAL_MS);

// Tick the "Data X ago" display every 60s so it stays accurate
// without triggering a full data refetch. Also re-renders the
// failed-refresh indicator if the latest fetch errored.
setInterval(() => {
  if (!state.raw) return;
  updateStaleIndicator();
}, 60000);

// =============================================================
// QUICK NAV — Auto-hide bottom bar
//   - Visible by default, and when scrolling UP
//   - Hides when scrolling DOWN past a small threshold
//   - Smooth-scrolls to sections on tap
//   - Highlights the section currently in view (scrollspy)
// =============================================================
(function initQuickNav() {
  const nav = document.getElementById('quickNav');
  if (!nav) return;
  const items = Array.from(nav.querySelectorAll('.quick-nav-item'));
  if (!items.length) return;

  // ===== Visibility (auto-hide on scroll-down, show on scroll-up) =====
  let lastY = window.scrollY;
  let lastDirection = 'up';
  // How far you have to scroll in the same direction before we react.
  // Prevents the bar from flickering on tiny micro-scrolls.
  const SCROLL_THRESHOLD = 8;
  // Don't hide when near the bottom of the page (last 200px) — users tap nav exactly here.
  const NEAR_BOTTOM_PX = 200;

  function showBar()  { nav.classList.add('visible'); }
  function hideBar()  { nav.classList.remove('visible'); }

  // Initial state: visible
  showBar();

  let ticking = false;
  function onScroll() {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      const y = window.scrollY;
      const dy = y - lastY;
      const docH = document.documentElement.scrollHeight;
      const viewH = window.innerHeight;
      const nearBottom = (docH - (y + viewH)) < NEAR_BOTTOM_PX;
      const atTop = y < 80;

      // Always show at top of page or near bottom
      if (atTop || nearBottom) {
        showBar();
      } else if (Math.abs(dy) > SCROLL_THRESHOLD) {
        // Scrolling down → hide; scrolling up → show
        if (dy > 0 && lastDirection !== 'down') {
          hideBar();
          lastDirection = 'down';
        } else if (dy < 0 && lastDirection !== 'up') {
          showBar();
          lastDirection = 'up';
        }
      }
      lastY = y;
      updateActiveSection();
      ticking = false;
    });
  }

  // ===== Scrollspy =====
  function updateActiveSection() {
    const sections = [
      { target: '.span-rejection', el: document.querySelector('.span-rejection') },
      { target: '.span-budget',    el: document.querySelector('.span-budget') },
      { target: '.span-forecast',  el: document.querySelector('.span-forecast') }
    ];
    let activeTarget = 'top';
    if (window.scrollY >= 200) {
      const viewportMark = window.scrollY + window.innerHeight * 0.33;
      let bestY = -Infinity;
      for (const s of sections) {
        if (!s.el) continue;
        const top = s.el.getBoundingClientRect().top + window.pageYOffset;
        if (top <= viewportMark && top > bestY) {
          bestY = top;
          activeTarget = s.target;
        }
      }
    }
    items.forEach(item => {
      item.classList.toggle('is-active', item.dataset.target === activeTarget);
    });
  }

  // ===== Smooth-scroll on item click =====
  items.forEach(item => {
    item.addEventListener('click', () => {
      const target = item.dataset.target;
      if (target === 'top') {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        const el = document.querySelector(target);
        if (el) {
          // Offset for the sticky bottom bar (~70px) and breathing room (~16px)
          const top = el.getBoundingClientRect().top + window.pageYOffset - 16;
          window.scrollTo({ top, behavior: 'smooth' });
        }
      }
    });
  });

  // ===== Wire up =====
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', updateActiveSection);
  // Initial scrollspy state after sections finish rendering
  setTimeout(updateActiveSection, 500);
})();
</script>
