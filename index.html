<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#fafafa" />
<title>The Vault</title>
<meta name="description" content="Performance Tracker" />

<!-- Open Graph -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="SHARE Vault" />
<meta property="og:title" content="SHARE Vault" />
<meta property="og:description" content="Performance Tracker" />
<meta property="og:url" content="https://kartikkhanna.github.io/sharevault/" />

<meta name="theme-color" content="#E6007E" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 400; line-height: 1.4; font-size: 14px;
  background: #f8f8fa; color: #1a1a1a; min-height: 100vh; overflow-x: hidden;
}
:root {
  --ink: #1a1a1a; --ink-soft: #3a3a3a; --slate: #6b6b6b; --muted: #9a9a9a;
  --whisper: #cccccc; --hairline: #ececec; --divider: #d8d8d8;
  --page-bg: #f6f7f9; --card: #ffffff; --card-tint: #fafafa;
  --pink: #e6007e; --pink-deep: #b80064; --pink-soft: #ff4ba8;
  --pink-pale: #fde7f2; --pink-whisper: #fef5fa;
  --purple: #3b2a87; --purple-deep: #2a1d6b;
  --grad-1: #d8f0e0; --grad-2: #f5f0e0; --grad-3: #ecdcf2;
  --success: #1f8a4c; --success-tint: #e3f4ea;
  --danger: #c8102e; --danger-tint: #fde7e9; --warn: #c77e00;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03);
  --shadow-elev: 0 4px 16px -4px rgba(230,0,126,0.12), 0 1px 3px rgba(0,0,0,0.04);
  --radius-sm: 10px; --radius-md: 16px; --radius-lg: 24px; --radius-xl: 32px;
}
[data-theme="dark"] {
  --ink: #f5f5f5; --ink-soft: #d4d4d4; --slate: #a1a1a1; --muted: #737373;
  --whisper: #525252; --hairline: #1f1f1f; --divider: #2a2a2a;
  --page-bg: #0a0a0a; --card: #141414; --card-tint: #1a1a1a;
  --pink-pale: #2a0a1a; --pink-whisper: #1a0612;
  --grad-1: #1a2620; --grad-2: #1f1d18; --grad-3: #1f1525;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04);
  --shadow-elev: 0 4px 16px -4px rgba(255,51,153,0.2), 0 1px 3px rgba(0,0,0,0.4);
}
body { background: var(--page-bg); color: var(--ink); transition: background 240ms, color 240ms; }

.header-band {
  background: linear-gradient(135deg, var(--grad-1) 0%, var(--grad-2) 50%, var(--grad-3) 100%);
  padding: 24px 32px 20px; border-bottom: 1px solid rgba(0,0,0,0.04); position: relative;
}
.header-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px; flex-wrap: wrap; max-width: 1600px; margin: 0 auto;
}
.brand-block { display: flex; align-items: center; gap: 16px; }
.title-stack .title { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.1; }
.title-stack .title .pink-word { color: var(--pink); font-weight: 700; }
.title-stack .title .purple-word { color: var(--purple); font-weight: 700; }
.title-stack .subtitle { font-size: 11px; color: var(--slate); margin-top: 2px; letter-spacing: 0.02em; }
.meta-block { display: flex; align-items: center; gap: 14px; font-size: 11px; color: var(--slate); }
.meta-block .timestamp { font-weight: 500; letter-spacing: 0.02em; }
.partners {
  font-size: 10px; font-weight: 600; letter-spacing: 0.18em;
  color: var(--slate); text-transform: uppercase;
  padding-right: 14px; border-right: 1px solid rgba(0,0,0,0.1);
}
[data-theme="dark"] .partners { border-right-color: rgba(255,255,255,0.1); }
.icon-btn {
  background: var(--card); border: 1px solid var(--hairline); color: var(--slate);
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; font-family: inherit; transition: all 160ms ease;
}
.icon-btn:hover { background: var(--card-tint); color: var(--ink); border-color: var(--divider); }
.icon-btn svg { width: 14px; height: 14px; }
.icon-btn.spinning svg { animation: spin 700ms linear infinite; }

.filter-bar {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  max-width: 1600px; margin: 16px auto 0;
}
.filter-pill {
  background: var(--card); border: 1px solid rgba(0,0,0,0.05);
  border-radius: 999px; padding: 6px 6px 6px 16px;
  display: inline-flex; align-items: center; gap: 10px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}
[data-theme="dark"] .filter-pill { border-color: rgba(255,255,255,0.06); }
.filter-pill .label { font-size: 10px; font-weight: 600; color: var(--slate); letter-spacing: 0.06em; text-transform: uppercase; }
.segmented { display: inline-flex; background: transparent; gap: 0; }
.segmented button {
  background: transparent; border: none; color: var(--slate); font-family: inherit;
  font-size: 12px; font-weight: 500; padding: 6px 12px;
  border-radius: 999px; cursor: pointer; transition: all 200ms ease;
}
.segmented button:hover { color: var(--ink); }
.segmented button.active { background: var(--ink); color: var(--card); }
.date-input {
  background: transparent; border: none; color: var(--ink); font-family: inherit;
  font-size: 12px; font-weight: 500; padding: 6px 12px;
  border-radius: 999px; cursor: pointer; outline: none;
}
.date-input[disabled] { opacity: 0.3; cursor: not-allowed; }

.progress-strip {
  max-width: 1600px; margin: 14px auto 0;
  display: flex; align-items: center; gap: 14px;
  font-size: 11px; font-weight: 500; letter-spacing: 0.02em;
}
.progress-strip .text-left { color: var(--pink); font-weight: 600; }
.progress-strip .text-right { color: var(--slate); }
.progress-track {
  flex: 1; height: 3px; background: rgba(0,0,0,0.05);
  border-radius: 2px; position: relative; overflow: hidden;
}
[data-theme="dark"] .progress-track { background: rgba(255,255,255,0.08); }
.progress-fill { height: 100%; background: var(--pink); width: 0; border-radius: 2px; transition: width 1200ms cubic-bezier(0.16, 1, 0.3, 1); }
.progress-marker {
  position: absolute; top: -3px; width: 9px; height: 9px;
  background: var(--pink); border-radius: 50%; transform: translateX(-50%);
  box-shadow: 0 0 0 3px var(--card); transition: left 1200ms cubic-bezier(0.16, 1, 0.3, 1);
}

.main { max-width: 1600px; margin: 0 auto; padding: 20px 32px 32px; }
@media (max-width: 1200px) { .main { padding: 16px 20px; } .header-band { padding: 20px; } }

.section-head {
  font-size: 15px; font-weight: 700; letter-spacing: -0.01em; color: var(--ink);
  margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between;
}
.section-head .label-soft { font-weight: 400; color: var(--slate); }
.section-head .small-meta { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }

.dashboard-grid {
  display: grid; grid-template-columns: repeat(12, 1fr);
  grid-auto-rows: minmax(min-content, max-content); gap: 12px;
}
.kpi-strip { grid-column: span 12; display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
@media (max-width: 1200px) { .kpi-strip { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 700px) { .kpi-strip { grid-template-columns: repeat(2, 1fr); } }

.kpi-card {
  background: var(--card); border-radius: var(--radius-md); padding: 16px 18px;
  box-shadow: var(--shadow-card); display: flex; flex-direction: column;
  gap: 4px; position: relative; overflow: hidden;
}
.kpi-card .kpi-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--slate); }
.kpi-card .kpi-value { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); line-height: 1.1; font-variant-numeric: tabular-nums; }
.kpi-card.accent .kpi-value { color: var(--pink); }
.kpi-card .kpi-sub { font-size: 11px; color: var(--slate); font-weight: 500; }
.kpi-card .kpi-sub .pct-up { color: var(--success); font-weight: 600; }
.kpi-card .kpi-sub .pct-pink { color: var(--pink); font-weight: 600; }
.kpi-card.hero {
  background: linear-gradient(135deg, var(--pink) 0%, var(--pink-deep) 100%);
  color: white; box-shadow: var(--shadow-elev);
}
.kpi-card.hero .kpi-label, .kpi-card.hero .kpi-value, .kpi-card.hero .kpi-sub { color: white; }
.kpi-card.hero .kpi-label { opacity: 0.85; }
.kpi-card.hero .kpi-sub { opacity: 0.8; }

.chart-card {
  background: var(--card); border-radius: var(--radius-lg); padding: 18px 20px;
  box-shadow: var(--shadow-card); display: flex; flex-direction: column; min-height: 0;
}
.chart-card .chart-wrap { flex: 1; position: relative; min-height: 0; }
.chart-card canvas { max-height: 100%; }

.span-daily-trend { grid-column: span 8; min-height: 280px; }
.span-funnel { grid-column: span 4; min-height: 280px; }
.span-location { grid-column: span 5; min-height: 260px; }
.span-cumulative { grid-column: span 4; min-height: 260px; }
.span-dow { grid-column: span 3; min-height: 260px; }
.span-prizes { grid-column: span 7; min-height: 240px; }
.span-estimator { grid-column: span 5; min-height: 240px; }
.span-dq { grid-column: span 12; min-height: 100px; }

@media (max-width: 1400px) {
  .span-daily-trend, .span-funnel, .span-estimator { grid-column: span 12; }
  .span-location, .span-cumulative, .span-dow, .span-prizes { grid-column: span 6; }
}
@media (max-width: 900px) { .dashboard-grid > * { grid-column: span 12 !important; } }

.funnel-vis { display: flex; flex-direction: column; gap: 6px; padding: 8px 0; }
.funnel-row { display: grid; grid-template-columns: 100px 1fr auto; align-items: center; gap: 12px; }
.funnel-row .fr-label { font-size: 11px; font-weight: 600; color: var(--ink-soft); letter-spacing: 0.02em; }
.funnel-bar-track { height: 28px; background: var(--card-tint); border-radius: 6px; position: relative; overflow: hidden; }
.funnel-bar-fill {
  height: 100%; background: var(--pink); border-radius: 6px;
  display: flex; align-items: center; justify-content: flex-end; padding: 0 10px;
  color: white; font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums;
  transition: width 800ms cubic-bezier(0.16, 1, 0.3, 1); min-width: 36px;
}
.funnel-row:nth-child(1) .funnel-bar-fill { background: linear-gradient(90deg, var(--pink-deep), var(--pink)); }
.funnel-row:nth-child(2) .funnel-bar-fill { background: linear-gradient(90deg, var(--pink), var(--pink-soft)); }
.funnel-row:nth-child(3) .funnel-bar-fill { background: linear-gradient(90deg, var(--pink-soft), #ff80c2); }
.funnel-row:nth-child(4) .funnel-bar-fill { background: linear-gradient(90deg, #ff80c2, var(--success)); }
.funnel-row .fr-conv { font-size: 10px; color: var(--slate); font-weight: 600; letter-spacing: 0.04em; min-width: 40px; text-align: right; }

.estimator-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
.est-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 14px; align-items: end; }
.est-input { display: flex; flex-direction: column; gap: 4px; }
.est-input .ei-label { font-size: 10px; font-weight: 600; color: var(--slate); letter-spacing: 0.06em; text-transform: uppercase; }
.est-input .ei-value { font-size: 22px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; line-height: 1; }
.est-input.editable .ei-value { color: var(--pink); }
.rate-slider {
  -webkit-appearance: none; width: 100%; height: 4px; background: var(--hairline);
  border-radius: 2px; margin-top: 6px; outline: none;
}
.rate-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  background: var(--pink); border-radius: 50%; cursor: pointer;
  border: 3px solid var(--card); box-shadow: 0 0 0 1px var(--pink);
}
.rate-slider::-moz-range-thumb {
  width: 10px; height: 10px; background: var(--pink); border-radius: 50%; cursor: pointer;
  border: 3px solid var(--card); box-shadow: 0 0 0 1px var(--pink);
}
.est-output {
  background: linear-gradient(135deg, var(--pink-pale) 0%, var(--pink-whisper) 100%);
  padding: 12px 16px; border-radius: var(--radius-md); text-align: right; min-width: 140px;
}
.est-output .eo-label { font-size: 9px; font-weight: 700; color: var(--pink-deep); letter-spacing: 0.1em; text-transform: uppercase; }
.est-output .eo-num { font-size: 28px; font-weight: 800; color: var(--pink-deep); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; line-height: 1; margin-top: 2px; }

.dq-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
@media (max-width: 900px) { .dq-row { grid-template-columns: repeat(2, 1fr); } }
.dq-cell {
  background: var(--card-tint); padding: 10px 14px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.dq-cell .dq-label { font-size: 11px; font-weight: 600; color: var(--slate); }
.dq-cell .dq-num { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
.dq-cell.issue { background: var(--danger-tint); }
.dq-cell.issue .dq-num { color: var(--danger); }
.dq-cell.issue .dq-label { color: var(--danger); }
.dq-cell.clean .dq-num { color: var(--success); }

/* =========================================================
   REJECTION CATEGORIZATION — Why Not Applied
   ========================================================= */
.span-rejection { grid-column: span 12; min-height: 460px; }
.rejection-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 4px;
}
.rej-exclusion-note {
  font-size: 11px;
  color: var(--muted);
  margin: 4px 0 10px;
  padding: 6px 10px;
  background: var(--card-tint);
  border-radius: 8px;
  display: inline-block;
}
@media (max-width: 900px) { .rejection-grid { grid-template-columns: 1fr; } }
.rej-card {
  border: 1px solid var(--hairline);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  min-height: 380px;
}
.rej-card-warm { background: linear-gradient(180deg, #fff5fa 0%, #ffffff 100%); border-color: #f5c8de; }
.rej-card-rejected { background: linear-gradient(180deg, #fff7f5 0%, #ffffff 100%); border-color: #f5d4c8; }
.rej-card-pipeline { background: linear-gradient(180deg, #f5f9f6 0%, #ffffff 100%); border-color: #c8e0d0; }
[data-theme="dark"] .rej-card-warm { background: linear-gradient(180deg, rgba(230,0,126,0.08) 0%, rgba(255,255,255,0.02) 100%); border-color: rgba(230,0,126,0.3); }
[data-theme="dark"] .rej-card-rejected { background: linear-gradient(180deg, rgba(200,16,46,0.08) 0%, rgba(255,255,255,0.02) 100%); border-color: rgba(200,16,46,0.3); }
[data-theme="dark"] .rej-card-pipeline { background: linear-gradient(180deg, rgba(31,138,76,0.08) 0%, rgba(255,255,255,0.02) 100%); border-color: rgba(31,138,76,0.3); }

.rej-title { font-size: 13px; font-weight: 700; letter-spacing: 0.2px; color: var(--ink); }
.rej-title .icon { margin-right: 6px; font-size: 14px; }
.rej-count { font-size: 30px; font-weight: 700; line-height: 1; margin: 6px 0 4px; font-variant-numeric: tabular-nums; }
.rej-count-warm { color: var(--pink); }
.rej-count-rejected { color: #c8102e; }
.rej-count-pipeline { color: #1f8a4c; }
.rej-sub { font-size: 11px; color: var(--slate); margin-bottom: 12px; font-weight: 500; line-height: 1.35; }
.rej-cat-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.rej-cat-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; font-size: 11px; }
.rej-cat-label { color: var(--ink-soft); font-weight: 500; display: flex; align-items: center; gap: 6px; overflow: hidden; }
.rej-cat-label .cat-text { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex-shrink: 1; min-width: 0; }
.rej-cat-bar { flex: 1; height: 4px; background: var(--hairline); border-radius: 2px; overflow: hidden; min-width: 30px; }
.rej-cat-bar-fill { height: 100%; border-radius: 2px; transition: width 400ms ease; }
.rej-cat-bar-fill.warm { background: linear-gradient(90deg, var(--pink), #ff4ba8); }
.rej-cat-bar-fill.rejected { background: linear-gradient(90deg, #c8102e, #e8556f); }
.rej-cat-bar-fill.pipeline { background: linear-gradient(90deg, #1f8a4c, #4daa70); }
.rej-cat-num { font-size: 11px; font-weight: 700; color: var(--ink); min-width: 24px; text-align: right; font-variant-numeric: tabular-nums; }

.rej-leads-head {
  font-size: 9px; font-weight: 700; letter-spacing: 0.5px; color: var(--slate);
  text-transform: uppercase; margin: 6px 0 6px;
  padding-bottom: 6px; border-bottom: 1px solid var(--hairline);
}
.rej-leads-list {
  flex: 1; overflow-y: auto; max-height: 220px;
  padding-right: 4px; display: flex; flex-direction: column; gap: 6px;
}
.rej-leads-list::-webkit-scrollbar { width: 6px; }
.rej-leads-list::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 3px; }
.rej-lead {
  background: rgba(255,255,255,0.6);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  padding: 7px 9px;
  font-size: 10.5px;
  line-height: 1.4;
}
[data-theme="dark"] .rej-lead { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.06); }
.rej-lead-name {
  font-weight: 600; color: var(--ink); margin-bottom: 2px;
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
  font-size: 11px;
}
.rej-lead-name .name-text { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex-shrink: 1; min-width: 0; }
.rej-lead-loc {
  font-size: 9px; font-weight: 600;
  background: rgba(230,0,126,0.1); color: var(--pink);
  padding: 1px 5px; border-radius: 3px; letter-spacing: 0.3px;
  flex-shrink: 0;
}
.rej-lead-contact { color: var(--slate); font-size: 10px; display: flex; flex-direction: column; gap: 1px; font-variant-numeric: tabular-nums; }
.rej-lead-contact span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rej-lead-comment {
  margin-top: 4px; padding-top: 4px;
  border-top: 1px dotted var(--hairline);
  color: var(--ink-soft); font-style: italic;
  font-size: 10px; line-height: 1.35;
}
.rej-empty { text-align: center; color: var(--muted); font-size: 11px; padding: 20px 0; font-style: italic; }

/* =========================================================
   BUDGET UTILISATION
   ========================================================= */
.span-budget { grid-column: span 12; min-height: 460px; }

.budget-summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 14px;
}
@media (max-width: 900px) { .budget-summary { grid-template-columns: 1fr; } }

.budget-summary-card {
  padding: 16px 18px;
  border-radius: var(--radius-md);
  border: 1px solid var(--hairline);
  background: var(--card-tint);
}
.budget-summary-card.confirmed { background: linear-gradient(180deg, #fff5fa 0%, #ffffff 100%); border-color: #f5c8de; }
.budget-summary-card.contingent { background: linear-gradient(180deg, #fffaf0 0%, #ffffff 100%); border-color: #f0d8b0; }
.budget-summary-card.partner { background: linear-gradient(180deg, #f6f7fb 0%, #ffffff 100%); border-color: #d8dce8; }
[data-theme="dark"] .budget-summary-card.confirmed { background: linear-gradient(180deg, rgba(230,0,126,0.08) 0%, rgba(255,255,255,0.02) 100%); border-color: rgba(230,0,126,0.3); }
[data-theme="dark"] .budget-summary-card.contingent { background: linear-gradient(180deg, rgba(199,126,0,0.08) 0%, rgba(255,255,255,0.02) 100%); border-color: rgba(199,126,0,0.3); }
[data-theme="dark"] .budget-summary-card.partner { background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%); border-color: rgba(255,255,255,0.08); }

.budget-summary-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--slate); display: flex; align-items: center; gap: 6px;
}
.budget-summary-label .lock-icon { font-size: 11px; }
.budget-summary-value { font-size: 26px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; line-height: 1.1; margin: 4px 0 2px; }
.budget-summary-card.confirmed .budget-summary-value { color: var(--pink); }

  </div>

<script>
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbzbiVneiQhOIdmbAyde8rTy7wvX7FPnaedm8n9mGOPCX8M49ts3Io-9LA1_Wdz9Gv-Qaw/exec?token=sv-7f3x9k2p-mall-of-emirates-2026-q5tj8w4n',
  REFRESH_INTERVAL_MS: 5 * 60 * 1000
};

const state = {
  raw: null,
  filters: { mode: 'all', date: null, location: 'all' },
  rates: { signup: 0.15, lead: 0.30, approval: 0.10 },
  levers: {},  // toggled budget levers — { leverId: true/false }
  theme: 'light',
  charts: {}
};

const fmt = {
  num: n => Number(n || 0).toLocaleString('en-US'),
  pct: n => `${Math.round(n * 100)}%`,
  date: iso => { if (!iso) return ''; const d = new Date(iso + 'T00:00:00'); return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }); },
  fullDate: iso => { if (!iso) return ''; const d = new Date(iso + 'T00:00:00'); return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); },
  timestamp: iso => { if (!iso) return ''; const d = new Date(iso); return d.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false }); },
  relativeTime: iso => {
    if (!iso) return '';
    const then = new Date(iso).getTime();
    const now = Date.now();
    const diff = Math.max(0, now - then);
    const seconds = Math.round(diff / 1000);
    const minutes = Math.round(diff / 60000);
    const hours = Math.round(diff / 3600000);
    const days = Math.round(diff / 86400000);
    if (seconds < 30) return 'just now';
    if (minutes < 1) return `${seconds}s ago`;
    if (minutes < 60) return `${minutes}m ago`;
    if (hours < 24) {
      const remMin = minutes - (hours * 60);
      return remMin > 0 && hours < 6 ? `${hours}h ${remMin}m ago` : `${hours}h ago`;
    }
    if (days < 7) return `${days}d ago`;
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
  }
};

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function daysBetween(a, b) { return Math.round((new Date(b + 'T00:00:00') - new Date(a + 'T00:00:00')) / 86400000); }
function eachDate(s, e) {
  const out = [];
  let d = new Date(s + 'T00:00:00');
  const end = new Date(e + 'T00:00:00');
  while (d <= end) {
    out.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
    d.setDate(d.getDate() + 1);
  }
  return out;
}
function dayOfWeek(iso) { return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short' }); }

// =============================================================
// DEDUPE — strict (mobile AND email both match), keep FIRST visit
// =============================================================
function normalizeMobile(m) {
  if (!m) return '';
  const digits = String(m).replace(/\D/g, '');
  if (!digits) return '';
  return digits.length > 9 ? digits.slice(-9) : digits;
}
function normalizeEmail(e) {
  if (!e) return '';
  return String(e).trim().toLowerCase();
}
function dedupeRows(rows) {
  const sorted = [...rows].sort((a, b) => {
    const da = (a && a.date) ? String(a.date) : '9999-99-99';
    const db = (b && b.date) ? String(b.date) : '9999-99-99';
    return da.localeCompare(db);
  });
  const seen = new Map();
  const out = [];
  for (const r of sorted) {
    const mob = normalizeMobile(r.mobile);
    const em = normalizeEmail(r.email);
    const key = (mob && em) ? (mob + '|' + em) : null;
    if (!key) {
      out.push({ ...r, _dupes: 0 });
      continue;
    }
    if (!seen.has(key)) {
      seen.set(key, out.length);
      out.push({ ...r, _dupes: 0 });
    } else {
      const idx = seen.get(key);
      const kept = out[idx];
      kept._dupes = (kept._dupes || 0) + 1;
      const keptRaffle = Number(kept.raffle) || 0;
      const dupRaffle = Number(r.raffle) || 0;
      kept.raffle = keptRaffle + dupRaffle;
      if (!kept.prize && r.prize) kept.prize = r.prize;
      if (!kept.comment && r.comment) kept.comment = r.comment;
      if (kept.applied !== 'Y' && r.applied === 'Y') kept.applied = 'Y';
      if (kept.voucher !== 'Y' && r.voucher === 'Y') kept.voucher = 'Y';
      if (kept.verified !== 'Y' && r.verified === 'Y') kept.verified = 'Y';
    }
  }
  return out;
}
function dedupeSourceData(raw) {
  const chDedup = dedupeRows(raw.cardHolders || []);
  const nchDedup = dedupeRows(raw.nonCardHolders || []);
  const chDupes = chDedup.reduce((sum, r) => sum + (r._dupes || 0), 0);
  const nchDupes = nchDedup.reduce((sum, r) => sum + (r._dupes || 0), 0);
  return {
    ...raw,
    // Deduped arrays (for All-time, Date filter views — unique people)
    cardHolders: chDedup,
    nonCardHolders: nchDedup,
    // Raw arrays (for Today view — actual visits today, including repeat customers)
    cardHoldersRaw: raw.cardHolders || [],
    nonCardHoldersRaw: raw.nonCardHolders || [],
    dataQuality: {
      ...(raw.dataQuality || {}),
      duplicatesRemoved: chDupes + nchDupes,
      duplicatesCh: chDupes,
      duplicatesNch: nchDupes
    }
  };
}

function applyFilters(raw, filters) {
  if (!raw) return null;
  let activeDate = null;
  if (filters.mode === 'today') activeDate = todayISO();
  else if (filters.mode === 'date') activeDate = filters.date;
  const matchRow = r => {
    if (filters.location !== 'all' && r.location !== filters.location) return false;
    if (activeDate && r.date !== activeDate) return false;
    return true;
  };
  // For a specific date (Today or Date filter), use RAW data — otherwise repeat
  // visitors whose first visit was earlier in the activation get mapped back to
  // their first visit date by dedupe, and would never appear in "today" counts.
  // For All-time view, use deduped data — that's the right metric for unique people.
  const useRaw = !!activeDate;
  const chSource = useRaw ? (raw.cardHoldersRaw || raw.cardHolders) : raw.cardHolders;
  const nchSource = useRaw ? (raw.nonCardHoldersRaw || raw.nonCardHolders) : raw.nonCardHolders;
  return {
    cardHolders: chSource.filter(matchRow),
    nonCardHolders: nchSource.filter(matchRow),
    activeDate
  };
}

function computeMetrics(filtered) {
  const ch = filtered.cardHolders;
  const nch = filtered.nonCardHolders;
  return {
    cardHolders: ch.length,
    nonCardHolders: nch.length,
    footfall: ch.length + nch.length,
    applied: nch.filter(r => r.applied === 'Y').length,
    vouchers: nch.filter(r => r.voucher === 'Y').length,
    prizes: ch.filter(r => r.prize).length + nch.filter(r => r.prize).length
  };
}

function locationSplit(raw, filters) {
  const locs = ['MoE', 'DCC', 'MCC'];
  let activeDate = null;
  if (filters.mode === 'today') activeDate = todayISO();
  else if (filters.mode === 'date') activeDate = filters.date;
  // Use raw arrays when filtering by a specific date so today's repeat visitors
  // (who'd otherwise be merged back to first-visit date by dedupe) count properly.
  const useRaw = !!activeDate;
  const chSource = useRaw ? (raw.cardHoldersRaw || raw.cardHolders) : raw.cardHolders;
  const nchSource = useRaw ? (raw.nonCardHoldersRaw || raw.nonCardHolders) : raw.nonCardHolders;
  return locs.map(loc => {
    const inLoc = r => r.location === loc && (!activeDate || r.date === activeDate);
    const ch = chSource.filter(inLoc);
    const nch = nchSource.filter(inLoc);
    return {
      code: loc,
      cardHolders: ch.length,
      nonCardHolders: nch.length,
      total: ch.length + nch.length,
      applied: nch.filter(r => r.applied === 'Y').length,
      vouchers: nch.filter(r => r.voucher === 'Y').length
    };
  });
}

function dailyTimeline(raw) {
  // Use raw arrays so each day's bar reflects actual visits that day,
  // not unique-people-first-seen-that-day (which would over-attribute to opening days).
  const ch = raw.cardHoldersRaw || raw.cardHolders;
  const nch = raw.nonCardHoldersRaw || raw.nonCardHolders;
  const dates = eachDate(raw.period.start, raw.period.end);
  let cumulative = 0;
  return dates.map(d => {
    const chCount = ch.filter(r => r.date === d).length;
    const nchCount = nch.filter(r => r.date === d).length;
    cumulative += (chCount + nchCount);
    return { date: d, cardHolders: chCount, nonCardHolders: nchCount, total: chCount + nchCount, cumulative };
  });
}

function dayOfWeekSplit(raw) {
  const days = { Mon: 0, Tue: 0, Wed: 0, Thu: 0, Fri: 0, Sat: 0, Sun: 0 };
  const all = [...raw.cardHolders, ...raw.nonCardHolders];
  all.forEach(r => {
    if (r.date) {
      const day = dayOfWeek(r.date);
      if (days[day] !== undefined) days[day]++;
    }
  });
  return Object.entries(days).map(([day, count]) => ({ day, count }));
}

function prizeSplit(filtered) {

    { label: 'AED 250 SP',   pattern: /aed 250/i },

    { label: 'Carrefour',    pattern: /carrefour/i },
    { label: 'Lululemon',    pattern: /lululemon/i },
    { label: 'LEGO',         pattern: /lego/i },
    { label: 'Psycho Bunny', pattern: /psycho bunny/i },
    { label: 'AllSaints',    pattern: /allsaints/i }
  ];
  const all = [...filtered.cardHolders.map(r => r.prize), ...filtered.nonCardHolders.map(r => r.prize)].filter(Boolean);

    label: c.label,
    count: all.filter(p => c.pattern.test(p)).length
  })).sort((a, b) => b.count - a.count);
}

function lookupPrizeCost(prizeStr) {
  if (!prizeStr) return null;
  const s = String(prizeStr).trim();
  if (!s) return null;
  for (const rule of PRIZE_COSTS) {
    if (rule.match.test(s)) return rule;
  }
  return null;
}

// Compute the three-bucket budget split
// CONFIRMED = everything CH gets (SHARE Points + Noor Box for CH) + Mall Gift Cards (Applied=Y × 50)
// CONTINGENT = everything NCH gets that is SHARE-funded (SHARE Points + Noor Box for NCH) × approval rate
// PARTNER = everything partner-funded (both CH and NCH) — informational
function computeBudget(filtered, approvalRate) {
  const confirmed = { total: 0, breakdown: {}, count: 0 };
  const contingent = { total: 0, breakdown: {}, fullPotential: 0, count: 0 };
  const partner = { total: 0, breakdown: {}, count: 0 };
  let unmatched = { count: 0, samples: [] };

  // Process Card Holder prizes
  for (const row of filtered.cardHolders) {
    if (!row.prize || !String(row.prize).trim()) continue;
    const match = lookupPrizeCost(row.prize);
    if (!match) {
      unmatched.count++;
      if (unmatched.samples.length < 5) unmatched.samples.push(`CH: "${row.prize}"`);
      continue;
    }
    if (match.funder === 'share') {
      // CH SHARE prizes = confirmed
      confirmed.total += match.cost;
      confirmed.count++;
      const key = match.label;
      if (!confirmed.breakdown[key]) confirmed.breakdown[key] = { cost: 0, count: 0 };
      confirmed.breakdown[key].cost += match.cost;
      confirmed.breakdown[key].count++;
    } else {
      // CH partner prizes = partner-funded
      partner.total += match.cost;
      partner.count++;
      const key = `${match.partner} — ${match.label}`;
      if (!partner.breakdown[key]) partner.breakdown[key] = { cost: 0, count: 0 };
      partner.breakdown[key].cost += match.cost;
      partner.breakdown[key].count++;
    }
  }

  // Process Non-Cardholder prizes
  for (const row of filtered.nonCardHolders) {
    if (!row.prize || !String(row.prize).trim()) continue;
    const match = lookupPrizeCost(row.prize);
    if (!match) {
      unmatched.count++;
      if (unmatched.samples.length < 5) unmatched.samples.push(`NCH: "${row.prize}"`);
      continue;
    }
    if (match.funder === 'share') {
      // NCH SHARE prizes = contingent (only realised on approval)
      contingent.fullPotential += match.cost;
      contingent.count++;
      const key = match.label;
      if (!contingent.breakdown[key]) contingent.breakdown[key] = { fullCost: 0, count: 0 };
      contingent.breakdown[key].fullCost += match.cost;
      contingent.breakdown[key].count++;
    } else {
      partner.total += match.cost;
      partner.count++;
      const key = `${match.partner} — ${match.label}`;
      if (!partner.breakdown[key]) partner.breakdown[key] = { cost: 0, count: 0 };
      partner.breakdown[key].cost += match.cost;
      partner.breakdown[key].count++;
    }
  }

  // Apply approval rate to contingent
  contingent.total = Math.round(contingent.fullPotential * approvalRate);
  // Build expected-cost view per category
  for (const key of Object.keys(contingent.breakdown)) {
    contingent.breakdown[key].cost = Math.round(contingent.breakdown[key].fullCost * approvalRate);
  }

  // Mall Gift Cards: AED 50 per Applied=Y, regardless of approval — goes into CONFIRMED
  const appliedCount = filtered.nonCardHolders.filter(r => r.applied === 'Y').length;
  const giftCardCost = appliedCount * 50;
  if (giftCardCost > 0) {
    confirmed.total += giftCardCost;
    confirmed.breakdown['Mall Gift Card (AED 50)'] = {
      cost: giftCardCost,
      count: appliedCount,
      note: `${appliedCount} sign-ups × AED 50`
    };
  }

  return { confirmed, contingent, partner, unmatched, appliedCount };
}

// =============================================================
// BUDGET FORECAST — Location-aware projection + levers
// =============================================================
const SHARE_BUDGET_CEILING = 700000;

// Compute per-location SHARE spend so far (CH confirmed + NCH expected at current approval rate + gift cards)
// Used to derive a daily run-rate per location
function computeLocationSpend(raw, approvalRate, location) {
  const ch = raw.cardHolders.filter(r => r.location === location);
  const nch = raw.nonCardHolders.filter(r => r.location === location);

  let confirmed = 0;
  for (const row of ch) {
    if (!row.prize) continue;
    const m = lookupPrizeCost(row.prize);
    if (m && m.funder === 'share') confirmed += m.cost;
  }
  // Mall gift cards: applied=Y × 50, confirmed
  const appliedCount = nch.filter(r => r.applied === 'Y').length;
  confirmed += appliedCount * 50;

  // NCH SHARE prizes (contingent, weighted by approval rate)
  let contingentFull = 0;
  for (const row of nch) {
    if (!row.prize) continue;
    const m = lookupPrizeCost(row.prize);
    if (m && m.funder === 'share') contingentFull += m.cost;
  }
  const contingentExpected = Math.round(contingentFull * approvalRate);

  return {
    location,
    confirmed,
    contingentFull,
    contingentExpected,
    expectedTotal: confirmed + contingentExpected,
    appliedCount
  };
}

// Compute the forecast for one location, given its window and current spend
function projectLocationForecast(spend, todayISO, locConfig, raw, approvalRate, peerDailyRates) {
  const periodStart = locConfig.start;
  const periodEnd = locConfig.end;

  // How many days has this location been running?
  const today = new Date(todayISO + 'T00:00:00');
  const start = new Date(periodStart + 'T00:00:00');
  const end = new Date(periodEnd + 'T00:00:00');

  const daysElapsed = today < start ? 0 : Math.min(
    daysBetween(periodStart, todayISO) + 1,
    daysBetween(periodStart, periodEnd) + 1
  );
  const daysRemaining = today > end ? 0 : Math.max(0, daysBetween(todayISO, periodEnd));
  const daysTotal = daysBetween(periodStart, periodEnd) + 1;

  let status, dailyRate, futureSpend;
  if (today < start) {
    // Location hasn't started yet (MCC before 1 Jun)
    status = 'not_started';
    // Estimate using average of peer daily rates (MoE + DCC)
    dailyRate = peerDailyRates.length ? (peerDailyRates.reduce((a,b)=>a+b,0) / peerDailyRates.length) : 0;
    futureSpend = Math.round(dailyRate * daysTotal);
  } else if (today > end) {
    status = 'complete';
    dailyRate = daysElapsed > 0 ? spend.expectedTotal / daysElapsed : 0;
    futureSpend = 0;
  } else {
    status = 'in_progress';
    dailyRate = daysElapsed > 0 ? spend.expectedTotal / daysElapsed : 0;
    futureSpend = Math.round(dailyRate * daysRemaining);
  }

  return {
    location: spend.location,
    fullName: locConfig.fullName,
    status,
    daysElapsed,
    daysRemaining,
    daysTotal,
    currentSpend: spend.expectedTotal,
    dailyRate,
    futureSpend,
    projectedEnd: spend.expectedTotal + futureSpend,
    contingentFull: spend.contingentFull,
    confirmed: spend.confirmed
  };
}

function computeForecast(raw, approvalRate) {
  const today = todayISO();
  const locs = ['MoE', 'DCC', 'MCC'];
  const locConfigs = raw.period.locations;

  // Compute current spend per location
  const spends = locs.map(l => computeLocationSpend(raw, approvalRate, l));

  // Identify peer daily rates for MCC estimate (locations that have started)
  const startedSpends = [];
  for (let i = 0; i < locs.length; i++) {
    const cfg = locConfigs[locs[i]];
    const start = new Date(cfg.start + 'T00:00:00');
    const nowD = new Date(today + 'T00:00:00');
    if (nowD >= start) {
      const elapsed = daysBetween(cfg.start, today) + 1;
      const rate = elapsed > 0 ? spends[i].expectedTotal / elapsed : 0;
      if (rate > 0) startedSpends.push(rate);
    }
  }

  const forecasts = spends.map((s, i) =>
    projectLocationForecast(s, today, locConfigs[locs[i]], raw, approvalRate, startedSpends)
  );

  const totalCurrent = forecasts.reduce((a, f) => a + f.currentSpend, 0);
  const totalFuture = forecasts.reduce((a, f) => a + f.futureSpend, 0);
  const totalProjected = totalCurrent + totalFuture;

  return {
    forecasts,
    totalCurrent,
    totalFuture,
    totalProjected,
    ceiling: SHARE_BUDGET_CEILING,
    overBy: Math.max(0, totalProjected - SHARE_BUDGET_CEILING),
    underBy: Math.max(0, SHARE_BUDGET_CEILING - totalProjected)
  };
}

// =============================================================
// BUDGET LEVERS — model what-if scenarios
// =============================================================
// Each lever computes a "savings" amount in AED. User toggles ON to subtract from forecast.
function computeLevers(raw, approvalRate, forecast) {
  const today = todayISO();
  const locConfigs = raw.period.locations;
  const mccConfig = locConfigs.MCC;
  const mccStarted = new Date(today + 'T00:00:00') >= new Date(mccConfig.start + 'T00:00:00');

  const levers = [];

  // Helper: compute spend if we apply a transformation to MCC's projected NCH prize distribution
  // We use peer (MoE + DCC) prize distribution scaled to MCC's projected footfall
  const mccForecast = forecast.forecasts.find(f => f.location === 'MCC');
  const mccProjected = mccForecast ? mccForecast.projectedEnd : 0;
  const mccCurrent = mccForecast ? mccForecast.currentSpend : 0;
  const mccFuture = mccForecast ? mccForecast.futureSpend : 0;

  // Compute CH spend share (from MoE + DCC current data) — apply to MCC future spend
  const peerLocs = ['MoE', 'DCC'];
  let peerCHSpend = 0, peerNCHSpend = 0;
  for (const loc of peerLocs) {
    const ch = raw.cardHolders.filter(r => r.location === loc);
    const nch = raw.nonCardHolders.filter(r => r.location === loc);
    for (const r of ch) {
      const m = lookupPrizeCost(r.prize);
      if (m && m.funder === 'share') peerCHSpend += m.cost;
    }
    for (const r of nch) {
      const m = lookupPrizeCost(r.prize);
      if (m && m.funder === 'share') peerNCHSpend += m.cost;
    }
  }
  const peerCHRatio = (peerCHSpend + peerNCHSpend) > 0 ? peerCHSpend / (peerCHSpend + peerNCHSpend) : 0;

  // Lever 1: Cut all CH prizes at MCC (only applies to MCC future, since MoE/DCC are mostly done)
  levers.push({
    id: 'mcc_no_ch',
    label: 'Cut all Card Holder prizes at MCC',
    description: 'No SHARE Points or Noor Box for CH at City Centre Mirdif',
    savings: Math.round(mccFuture * peerCHRatio),
    applicable: mccProjected > 0
  });

  // Lever 2: Cut Noor Box from MCC entirely (CH + NCH)
  // Estimate Noor Box volume at MCC from peer rate
  let peerNoorCount = 0;
  for (const loc of peerLocs) {
    const all = [...raw.cardHolders.filter(r => r.location === loc), ...raw.nonCardHolders.filter(r => r.location === loc)];
    peerNoorCount += all.filter(r => /noor box/i.test(r.prize || '')).length;
  }
  const peerDaysElapsed = Math.max(1, daysBetween(locConfigs.MoE.start, today));
  const noorPerDay = peerNoorCount / (peerDaysElapsed * peerLocs.length);
  const mccDays = mccForecast ? mccForecast.daysTotal : 15;
  const mccNoorEstimate = Math.round(noorPerDay * mccDays * approvalRate);  // NCH portion contingent
  levers.push({
    id: 'mcc_no_noor',
    label: 'Cut Noor Box from MCC',
    description: 'Remove the 4 Noor Boxes planned for MCC',
    savings: 4 * 1300,  // 4 boxes × AED 1,300 — from xlsx plan
    applicable: mccProjected > 0
  });

  // Lever 3: Cut highest tier SP (AED 2,500) from MCC NCH
  // From xlsx plan: 5 × AED 2,500 at MCC NCH = 12,500
  levers.push({
    id: 'mcc_no_2500',
    label: 'Remove AED 2,500 SHARE Points tier at MCC',
    description: 'Drop the highest tier NCH prize at MCC (5 planned)',
    savings: Math.round(5 * 2500 * approvalRate),
    applicable: mccProjected > 0
  });

  // Lever 4: Cut AED 1,000 SP from MCC NCH (15 planned)
  levers.push({
    id: 'mcc_no_1000',
    label: 'Remove AED 1,000 SHARE Points tier at MCC',
    description: 'Drop the second-highest tier NCH prize at MCC (15 planned)',
    savings: Math.round(15 * 1000 * approvalRate),
    applicable: mccProjected > 0
  });

  // Lever 5: Reduce AED 500 SP volume by 50% at MCC NCH (350 planned)
  levers.push({
    id: 'mcc_500_half',
    label: 'Reduce AED 500 SHARE Points volume by 50% at MCC',
    description: 'Cut 350 → 175 of AED 500 prizes at MCC NCH',
    savings: Math.round(175 * 500 * approvalRate),
    applicable: mccProjected > 0
  });

  // Lever 6: Reduce AED 250 SP volume by 30% at MCC NCH (1800 planned, the bulk volume)
  levers.push({
    id: 'mcc_250_minus_30',
    label: 'Reduce AED 250 SHARE Points volume by 30% at MCC',
    description: 'Cut the bulk volume tier (1800 → 1260) at MCC NCH',
    savings: Math.round(540 * 250 * approvalRate),
    applicable: mccProjected > 0
  });

  return levers;
}

function renderForecastSection(forecast, levers, activeLevers, raw, approvalRate) {
  const totalSavings = levers.filter(l => activeLevers[l.id]).reduce((a, l) => a + l.savings, 0);
  const projectedAfterLevers = forecast.totalProjected - totalSavings;
  const ceiling = forecast.ceiling;
  const overOrUnderRaw = ceiling - projectedAfterLevers;
  const isOver = overOrUnderRaw < 0;

  // Progress bar math
  const ceilingBarPct = 100;
  const currentBarPct = Math.min(100, (forecast.totalCurrent / ceiling) * 100);
  const projectedBarPct = Math.min(100, (projectedAfterLevers / ceiling) * 100);
  const overflowPct = projectedAfterLevers > ceiling ? Math.min(100, ((projectedAfterLevers - ceiling) / ceiling) * 100) : 0;

  // Per-location rendering
  const buildLocationRow = (f) => {
    const statusBadge = f.status === 'complete' ? '<span class="loc-badge complete">Complete</span>' :
                       f.status === 'not_started' ? '<span class="loc-badge pending">Not started</span>' :
                       '<span class="loc-badge live">Live</span>';
    const isPending = f.status === 'not_started';
    const projection = isPending
      ? `<span class="loc-est">est. AED ${fmt.num(f.projectedEnd)}</span>`
      : `<span class="loc-spend">AED ${fmt.num(f.currentSpend)}</span> <span class="loc-arrow">→</span> <span class="loc-projected">AED ${fmt.num(f.projectedEnd)}</span>`;
    const dayInfo = f.status === 'complete' ? `${f.daysTotal} days · done` :
                    f.status === 'not_started' ? `${f.daysTotal} days planned · estimated from MoE/DCC` :
                    `${f.daysElapsed} of ${f.daysTotal} days · ${f.daysRemaining} left`;
    return `
      <div class="loc-row">
        <div class="loc-row-head">
          <span class="loc-code">${f.location}</span>
          <span class="loc-fullname">${f.fullName}</span>
          ${statusBadge}
        </div>
        <div class="loc-row-body">
          <div class="loc-meta">${dayInfo}</div>
          <div class="loc-money">${projection}</div>
        </div>
      </div>
    `;
  };

  // Sort levers by savings (highest first) for the ranked suggestions
  const rankedLevers = [...levers]
    .filter(l => l.applicable && l.savings > 0)
    .sort((a, b) => b.savings - a.savings);

  return `
    <div class="chart-card span-forecast fade-in d5">
      <div class="section-head">
        <span><span class="label-soft">Budget</span> Forecast &amp; Levers</span>
        <span class="small-meta">Target: AED ${fmt.num(ceiling)} · ${isOver ? `<span style="color:var(--danger);font-weight:700;">Over by AED ${fmt.num(Math.abs(overOrUnderRaw))}</span>` : `<span style="color:var(--success);font-weight:700;">Under by AED ${fmt.num(overOrUnderRaw)}</span>`}</span>
      </div>

      <!-- Headline Bar -->
      <div class="forecast-bar-wrap">
        <div class="forecast-bar-track">
          <div class="forecast-bar-fill confirmed" style="width:${currentBarPct}%" title="Spent so far: AED ${fmt.num(forecast.totalCurrent)}"></div>
          <div class="forecast-bar-fill projected" style="left:${currentBarPct}%; width:${Math.max(0, projectedBarPct - currentBarPct)}%" title="Forecast to add: AED ${fmt.num(projectedAfterLevers - forecast.totalCurrent)}"></div>

function renderBudgetSection(budget, approvalRate) {
  const confirmedTotal = budget.confirmed.total;
  const contingentExpected = budget.contingent.total;
  const contingentFull = budget.contingent.fullPotential;
  const partnerTotal = budget.partner.total;
  const shareExpected = confirmedTotal + contingentExpected;
  const shareWorstCase = confirmedTotal + contingentFull;

  const buildBreakdown = (breakdown, bucketClass) => {
    const sorted = Object.entries(breakdown).sort((a, b) => b[1].cost - a[1].cost);
    if (!sorted.length) return '<div class="budget-empty">No prizes awarded yet</div>';
    const max = Math.max(...sorted.map(([_, v]) => v.cost));
    return sorted.map(([label, v]) => {
      const pct = max > 0 ? (v.cost / max) * 100 : 0;
      const note = v.note ? `<span class="budget-note">${v.note}</span>` : '';
      return `
        <div class="budget-row">
          <div class="budget-row-label">
            <span class="budget-row-name">${label}</span>
            ${note}
          </div>
          <div class="budget-row-bar"><div class="budget-row-bar-fill ${bucketClass}" style="width:${pct}%"></div></div>
          <div class="budget-row-meta">
            <span class="budget-row-cost">AED ${fmt.num(v.cost)}</span>
            <span class="budget-row-count">${v.count}×</span>
          </div>
        </div>
      `;
    }).join('');
  };

  return `
    <div class="chart-card span-budget fade-in d5">
      <div class="section-head">
        <span><span class="label-soft">Budget</span> Utilisation</span>
        <span class="small-meta">SHARE Expected: <span style="color: var(--pink); font-weight: 700;">AED ${fmt.num(shareExpected)}</span></span>
      </div>

      <div class="budget-summary">
        <div class="budget-summary-card confirmed">
          <div class="budget-summary-label">🔒 Confirmed Spend</div>
          <div class="budget-summary-value">AED ${fmt.num(confirmedTotal)}</div>
          <div class="budget-summary-sub">${budget.confirmed.count} CH prizes + ${budget.appliedCount} gift cards</div>
          <div class="budget-summary-detail">Already incurred — non-negotiable</div>
        </div>
        <div class="budget-summary-card contingent">
          <div class="budget-summary-label">⏳ Contingent (Expected)</div>
          <div class="budget-summary-value">AED ${fmt.num(contingentExpected)}</div>
          <div class="budget-summary-sub">${budget.contingent.count} NCH prizes × <span id="approvalRateInline" style="color: var(--warn); font-weight: 700;">${fmt.pct(approvalRate)}</span> approval</div>
          <div class="budget-summary-detail">Worst case @100%: AED ${fmt.num(contingentFull)}</div>
        </div>
        <div class="budget-summary-card partner">
          <div class="budget-summary-label">🤝 Partner-Funded</div>
          <div class="budget-summary-value">AED ${fmt.num(partnerTotal)}</div>
          <div class="budget-summary-sub">${budget.partner.count} prizes · informational</div>
          <div class="budget-summary-detail">ENBD · Carrefour · tenants · entertainment</div>
        </div>
      </div>

      <div class="budget-exposure-row">
        <strong>SHARE Expected:</strong> <span class="total-spend">AED ${fmt.num(shareExpected)}</span>
        <span class="exposure-divider">·</span>
        <strong>SHARE Worst Case (100% approval):</strong> AED ${fmt.num(shareWorstCase)}
        <span class="exposure-divider">·</span>
        <strong>Total Across All Funders:</strong> AED ${fmt.num(shareExpected + partnerTotal)}
      </div>

      <div class="budget-slider-row">
        <span class="budget-slider-label">Approval rate assumption</span>
        <input type="range" class="rate-slider" id="approvalSlider" min="0" max="100" value="${approvalRate*100}" step="1" style="flex: 1;" />
        <span style="font-weight: 700; color: var(--warn); min-width: 50px; text-align: right;" id="approvalRateLabel">${fmt.pct(approvalRate)}</span>
      </div>

      <div class="budget-grid">
        <div class="budget-card budget-card-confirmed">
          <div class="budget-card-title"><span class="icon">🔒</span>Confirmed Breakdown</div>
          <div class="budget-card-sub">SHARE Points + Noor Box given to Card Holders · AED 50 Mall Gift Cards on sign-up</div>
          <div class="budget-rows">${buildBreakdown(budget.confirmed.breakdown, 'confirmed')}</div>
        </div>
        <div class="budget-card budget-card-contingent">
          <div class="budget-card-title"><span class="icon">⏳</span>Contingent Breakdown (NCH @ ${fmt.pct(approvalRate)})</div>
          <div class="budget-card-sub">SHARE Points + Noor Box earmarked for Non-Cardholders — only realised on card approval</div>
          <div class="budget-rows">${buildBreakdown(budget.contingent.breakdown, 'contingent')}</div>
        </div>
      </div>

      <div class="budget-partner-wide">
        <div class="budget-card-title"><span class="icon">🤝</span>Partner-Funded Breakdown</div>
        <div class="budget-card-sub">ENBD gold · Carrefour electronics · tenant brands · entertainment partners — not SHARE budget</div>
        <div class="budget-rows" style="margin-top: 10px;">${buildBreakdown(budget.partner.breakdown, 'partner')}</div>
      </div>

      ${budget.unmatched.count > 0 ? `
        <div class="budget-unmatched">
          ⚠ ${budget.unmatched.count} prize${budget.unmatched.count > 1 ? 's' : ''} couldn't be matched to cost table — not counted in totals.
          ${budget.unmatched.samples.length ? `Samples: ${budget.unmatched.samples.slice(0, 3).join(', ')}` : ''}
        </div>
      ` : ''}
    </div>
  `;
}


function render() {

  const periodEnd = raw.period.end;
  const totalDays = daysBetween(periodStart, periodEnd) + 1;
  const today = todayISO();
  const dayOfPeriod = Math.max(1, Math.min(totalDays, daysBetween(periodStart, today) + 1));
  const periodPct = Math.max(0, Math.min(1, dayOfPeriod / totalDays));
  const daysRemaining = Math.max(0, daysBetween(today, periodEnd));

  const allNch = raw.nonCardHolders.length;
  const daysSinceStart = Math.max(1, daysBetween(periodStart, today) + 1);
  const avgDailyNch = allNch / daysSinceStart;

function categorizeComment(rawComment) {
  if (!rawComment) return null;
  const c = String(rawComment).toLowerCase().trim();
  if (!c) return null;
  for (const rule of REJECTION_RULES) {
    for (const kw of rule.keywords) {
      if (c.includes(kw)) return rule;
    }
  }
  return { bucket: 'rejected', label: 'Other / Uncategorized', icon: '📝', keywords: [] };
}

function buildRejectionData(nonCardHolders) {
  const buckets = {
    warm: { rows: [], categories: {} },
    rejected: { rows: [], categories: {} }
  };
  const filtered = {
    appliedY: 0,
    inPipeline: 0,
    noComment: 0
  };

  for (const row of nonCardHolders) {
    const applied = String(row.applied || '').trim().toUpperCase();
    if (applied === 'Y') { filtered.appliedY++; continue; }

    const comment = (row.comment || '').trim();
    if (!comment) { filtered.noComment++; continue; }

    const rule = categorizeComment(comment);
    if (!rule) { filtered.noComment++; continue; }

    if (rule.bucket === 'excluded') { filtered.inPipeline++; continue; }

    const b = buckets[rule.bucket];
    if (!b) continue;
    b.rows.push({ ...row, _category: rule.label, _icon: rule.icon });
    b.categories[rule.label] = (b.categories[rule.label] || 0) + 1;
  }

  for (const key of Object.keys(buckets)) {
    buckets[key].categoryList = Object.entries(buckets[key].categories)
      .map(([label, count]) => ({ label, count, icon: REJECTION_RULES.find(r => r.label === label)?.icon || '📝' }))
      .sort((a, b) => b.count - a.count);
    buckets[key].rows.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  }
  buckets._filtered = filtered;
  return buckets;
}

function renderRejectionSection(nonCardHolders) {
  const data = buildRejectionData(nonCardHolders);
  const totalShown = data.warm.rows.length + data.rejected.rows.length;
  const filtered = data._filtered;

  const buildCategoryBars = (catList, bucketClass) => {
    if (!catList.length) return '<div class="rej-empty">No data yet</div>';
    const max = Math.max(...catList.map(c => c.count));
    return catList.map(c => {
      const pct = (c.count / max) * 100;
      return `
        <div class="rej-cat-row">
          <div class="rej-cat-label">
            <span style="font-size:11px;">${c.icon}</span>
            <span class="cat-text">${c.label}</span>
            <div class="rej-cat-bar"><div class="rej-cat-bar-fill ${bucketClass}" style="width:${pct}%"></div></div>
          </div>
          <div class="rej-cat-num">${c.count}</div>
        </div>
      `;
    }).join('');
  };

  const buildLeadCard = (row) => {
    const escapedComment = row.comment ? String(row.comment).replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : '';
    const escapedName = row.name ? String(row.name).replace(/</g, '&lt;').replace(/>/g, '&gt;') : 'Unknown';
    return `
      <div class="rej-lead">
        <div class="rej-lead-name">
          <span class="name-text">${row._icon || ''} ${escapedName}</span>
          ${row.location ? `<span class="rej-lead-loc">${row.location}</span>` : ''}
        </div>
        <div class="rej-lead-contact">
          ${row.mobile ? `<span>📱 ${row.mobile}</span>` : ''}
          ${row.email ? `<span>✉️ ${row.email}</span>` : ''}
        </div>
        ${escapedComment ? `<div class="rej-lead-comment">"${escapedComment}"</div>` : ''}
      </div>
    `;
  };

  const warmList = data.warm.rows.length
    ? data.warm.rows.map(buildLeadCard).join('')
    : '<div class="rej-empty">No warm leads captured yet</div>';
  const rejectedList = data.rejected.rows.length
    ? data.rejected.rows.slice(0, 25).map(buildLeadCard).join('')
    : '<div class="rej-empty">No rejections captured yet</div>';

  const excludedSummaryParts = [];
  if (filtered.appliedY > 0) excludedSummaryParts.push(`${filtered.appliedY} signed up`);
  if (filtered.inPipeline > 0) excludedSummaryParts.push(`${filtered.inPipeline} in pipeline`);
  const excludedSummary = excludedSummaryParts.length
    ? `<div class="rej-exclusion-note">Excluded from analysis: ${excludedSummaryParts.join(' · ')}</div>`
    : '';

  return `
    <div class="chart-card span-rejection fade-in d4">
      <div class="section-head">
        <span><span class="label-soft">Why Not</span> Applied — Comments Analysis</span>
        <span class="small-meta">${totalShown} categorised of ${nonCardHolders.length} NCH</span>
      </div>
      ${excludedSummary}

      <div class="rejection-grid">

        <div class="rej-card rej-card-warm">
          <div class="rej-title"><span class="icon">🔥</span>Warm Leads</div>
          <div class="rej-count rej-count-warm">${data.warm.rows.length}</div>
          <div class="rej-sub">Has a path back — business owners, self-employed, upgrade candidates, will-apply-laters. CRM target list.</div>
          <div class="rej-cat-list">${buildCategoryBars(data.warm.categoryList, 'warm')}</div>
          <div class="rej-leads-head">Contact List · scroll for all</div>
          <div class="rej-leads-list">${warmList}</div>
        </div>

        <div class="rej-card rej-card-rejected">
          <div class="rej-title"><span class="icon">❌</span>Outright Rejected</div>
          <div class="rej-count rej-count-rejected">${data.rejected.rows.length}</div>
          <div class="rej-sub">No path forward — eligibility, income, age, no UAE bank, not interested.</div>
          <div class="rej-cat-list">${buildCategoryBars(data.rejected.categoryList, 'rejected')}</div>
          <div class="rej-leads-head">Recent · top 25 shown</div>
          <div class="rej-leads-list">${rejectedList}</div>
        </div>

      </div>
    </div>
  `;
}

function renderFunnel(footfall, nch, applied, issued) {
  const max = Math.max(1, footfall);
  const stages = [
    { label: 'Footfall', val: footfall, prev: footfall },
    { label: 'Non-CH', val: nch, prev: footfall },
    { label: 'Applied', val: applied, prev: nch },
    { label: 'Issued (est)', val: issued, prev: applied }
  ];
  document.getElementById('funnelVis').innerHTML = stages.map(s => {
    const pct = (s.val / max) * 100;
    const conv = s.prev ? Math.round((s.val / s.prev) * 100) : 0;
    return `
      <div class="funnel-row">
        <div class="fr-label">${s.label}</div>
        <div class="funnel-bar-track">
          <div class="funnel-bar-fill" style="width: ${Math.max(8, pct)}%">${fmt.num(s.val)}</div>
        </div>
        <div class="fr-conv">${conv}%</div>
      </div>
    `;
  }).join('');
}

function destroyChart(key) {
  if (state.charts[key]) {
    state.charts[key].destroy();
    delete state.charts[key];
  }
}

function chartColors() {
  const isDark = state.theme === 'dark';
  return {
    pink: '#e6007e',
    pinkSoft: '#ff4ba8',
    pinkPale: isDark ? 'rgba(230,0,126,0.25)' : 'rgba(230,0,126,0.12)',
    ink: isDark ? '#f5f5f5' : '#1a1a1a',
    inkSoft: isDark ? 'rgba(245,245,245,0.4)' : 'rgba(26,26,26,0.4)',
    grid: isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)',
    muted: isDark ? '#a1a1a1' : '#9a9a9a'
  };
}

function commonOpts() {
  const c = chartColors();
  return {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 600, easing: 'easeOutCubic' },
    plugins: {
      legend: { labels: { color: c.muted, font: { family: 'Poppins', size: 10, weight: '500' }, boxWidth: 10, boxHeight: 10, padding: 12 } },
      tooltip: {
        backgroundColor: c.ink, titleColor: 'white', bodyColor: 'rgba(255,255,255,0.85)',
        padding: 10, cornerRadius: 8,
        titleFont: { family: 'Poppins', size: 11, weight: '600' },
        bodyFont: { family: 'Poppins', size: 11 },
        displayColors: true, boxPadding: 4
      }
    },
    scales: {
      x: { grid: { color: c.grid, drawBorder: false }, ticks: { color: c.muted, font: { family: 'Poppins', size: 9 }, maxRotation: 0 } },
      y: { grid: { color: c.grid, drawBorder: false }, ticks: { color: c.muted, font: { family: 'Poppins', size: 9 } }, beginAtZero: true }
    }
  };
}

function renderCharts(raw, filtered, locs) {
  const c = chartColors();
  const daily = dailyTimeline(raw);
  const dow = dayOfWeekSplit(raw);
  const prizes = prizeSplit(filtered);
  const today = todayISO();
  const todayIdx = daily.findIndex(d => d.date === today);

  destroyChart('trend');
  state.charts.trend = new Chart(document.getElementById('trendChart'), {
    type: 'bar',
    data: {
      labels: daily.map(d => fmt.date(d.date)),
      datasets: [
        { label: 'Card Holders', data: daily.map(d => d.cardHolders), backgroundColor: c.pink, borderRadius: { topLeft: 4, topRight: 4 }, stack: 'a', maxBarThickness: 24 },
        { label: 'Non-Cardholders', data: daily.map(d => d.nonCardHolders), backgroundColor: c.ink, borderRadius: 0, stack: 'a', maxBarThickness: 24 }
      ]
    },
    options: {
      ...commonOpts(),
      scales: {
        x: { ...commonOpts().scales.x, stacked: true },
        y: { ...commonOpts().scales.y, stacked: true }
      }
    }
  });

  destroyChart('location');
  state.charts.location = new Chart(document.getElementById('locationChart'), {
    type: 'bar',
    data: {
      labels: locs.map(l => l.code),
      datasets: [
        { label: 'Card Holders', data: locs.map(l => l.cardHolders), backgroundColor: c.pink, borderRadius: 6, maxBarThickness: 32 },
        { label: 'Non-Cardholders', data: locs.map(l => l.nonCardHolders), backgroundColor: c.ink, borderRadius: 6, maxBarThickness: 32 },
        { label: 'Applied', data: locs.map(l => l.applied), backgroundColor: c.pinkSoft, borderRadius: 6, maxBarThickness: 32 }
      ]
    },
    options: commonOpts()
  });

  destroyChart('cumulative');
  const cumActual = daily.map((d, i) => i <= todayIdx ? d.cumulative : null);
  const daysElapsed = Math.max(1, todayIdx + 1);
  const currentCum = todayIdx >= 0 ? daily[todayIdx].cumulative : 0;
  const dailyAvg = currentCum / daysElapsed;
  const cumForecast = daily.map((d, i) => {
    if (i < todayIdx) return null;
    if (i === todayIdx) return currentCum;
    const extraDays = i - todayIdx;
    return Math.round(currentCum + (dailyAvg * extraDays));
  });
  state.charts.cumulative = new Chart(document.getElementById('cumulativeChart'), {
    type: 'line',
    data: {
      labels: daily.map(d => fmt.date(d.date)),
      datasets: [
        { label: 'Actual', data: cumActual, borderColor: c.pink, backgroundColor: c.pinkPale, borderWidth: 2.5, pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: c.pink, tension: 0.3, fill: true },
        { label: 'Forecast', data: cumForecast, borderColor: c.pink, borderWidth: 1.5, borderDash: [4, 4], pointRadius: 0, tension: 0.3, fill: false }
      ]
    },
    options: commonOpts()
  });

  destroyChart('dow');
  state.charts.dow = new Chart(document.getElementById('dowChart'), {
    type: 'bar',
    data: {
      labels: dow.map(d => d.day),
      datasets: [{ label: 'Footfall', data: dow.map(d => d.count), backgroundColor: c.pink, borderRadius: 6, maxBarThickness: 22 }]
    },
    options: { ...commonOpts(), plugins: { ...commonOpts().plugins, legend: { display: false } } }
  });

  destroyChart('prizes');
  const topPrizes = prizes.slice(0, 8);
  state.charts.prizes = new Chart(document.getElementById('prizeChart'), {
    type: 'bar',
    data: {
      labels: topPrizes.map(p => p.label),
      datasets: [{ label: 'Awarded', data: topPrizes.map(p => p.count), backgroundColor: topPrizes.map((_, i) => i < 3 ? c.pink : i < 6 ? c.pinkSoft : c.ink), borderRadius: 6 }]
    },
    options: { ...commonOpts(), indexAxis: 'y', plugins: { ...commonOpts().plugins, legend: { display: false } } }
  });
}

function attachHandlers() {
  document.getElementById('themeBtn').addEventListener('click', () => {
    state.theme = state.theme === 'light' ? 'dark' : 'light';
    document.body.setAttribute('data-theme', state.theme);
    localStorage.setItem('share-dashboard-theme', state.theme);
    render();
  });

  document.getElementById('syncBtn').addEventListener('click', async () => {
    const btn = document.getElementById('syncBtn');
    if (btn.classList.contains('spinning')) return;

    btn.classList.add('spinning');
    btn.disabled = true;

    showToast('Pulling latest from agency xlsx…', 'info', 0);

    try {
      const separator = CONFIG.API_URL.includes('?') ? '&' : '?';
      const url = CONFIG.API_URL + separator + 'mode=sync&_t=' + Date.now();

      const res = await fetch(url, { cache: 'no-store' });
      const result = await res.json();

      if (result.error) throw new Error(result.error);

      const appended = result.lastSyncAppended || 0;
      const elapsed = result.elapsedSeconds || 0;
      const msg = appended > 0
        ? `Pulled ${appended} new row${appended === 1 ? '' : 's'} in ${elapsed}s`
        : `Already up to date · ${elapsed}s`;
      showToast(msg, 'success', 3000);

      await fetchData();

    } catch (err) {
      console.error('Sync failed:', err);
      showToast('Sync failed: ' + err.message, 'error', 5000);
    } finally {
      setTimeout(() => {
        btn.classList.remove('spinning');
        btn.disabled = false;
      }, 600);
    }
  });

  document.getElementById('refreshBtn').addEventListener('click', () => {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    fetchData().finally(() => { setTimeout(() => btn.classList.remove('spinning'), 500); });
  });

  document.getElementById('modeSegment').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      state.filters.mode = b.dataset.mode;
      if (state.filters.mode === 'date' && !state.filters.date) state.filters.date = state.raw.period.start;
      render();
    });
  });

  document.getElementById('locSegment').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      state.filters.location = b.dataset.loc;
      render();
    });
  });

  document.getElementById('dateInput').addEventListener('change', e => {
    state.filters.date = e.target.value;
    if (state.filters.mode !== 'date') state.filters.mode = 'date';
    render();
  });

  const signupSlider = document.getElementById('signupSlider');
  if (signupSlider) {
    signupSlider.addEventListener('input', e => {
      state.rates.signup = parseInt(e.target.value) / 100;
      document.getElementById('signupRateLabel').textContent = fmt.pct(state.rates.signup);
      updateProjections();
    });
  }
  const leadSlider = document.getElementById('leadSlider');
  if (leadSlider) {
    leadSlider.addEventListener('input', e => {
      state.rates.lead = parseInt(e.target.value) / 100;
      document.getElementById('leadRateLabel').textContent = fmt.pct(state.rates.lead);
      const inlineEl = document.getElementById('leadRateInline');
      if (inlineEl) inlineEl.textContent = fmt.pct(state.rates.lead);
      updateProjections();
    });
  }
  // Approval slider — re-render budget section only (not full dashboard) to preserve slider focus
  const approvalSlider = document.getElementById('approvalSlider');
  if (approvalSlider) {
    approvalSlider.addEventListener('input', e => {
      state.rates.approval = parseInt(e.target.value) / 100;
      document.getElementById('approvalRateLabel').textContent = fmt.pct(state.rates.approval);
      updateBudgetSection();
      updateForecastSection();
    });
  }

  // Lever checkboxes — toggle savings impact
  document.querySelectorAll('input[data-lever]').forEach(cb => {
    cb.addEventListener('change', e => {
      const leverId = e.target.dataset.lever;
      state.levers[leverId] = e.target.checked;
      updateForecastSection();
    });
  });
}

// Patch in only the budget section (used when approval slider moves)
function updateBudgetSection() {
  if (!state.raw) return;
  const filtered = applyFilters(state.raw, state.filters);
  const budget = computeBudget(filtered, state.rates.approval);
  const existing = document.querySelector('.span-budget');
  if (!existing) return;
  const wrapper = document.createElement('div');
  wrapper.innerHTML = renderBudgetSection(budget, state.rates.approval);
  existing.replaceWith(wrapper.firstElementChild);
  // Re-attach slider handler since the section was replaced
  const newSlider = document.getElementById('approvalSlider');
  if (newSlider) {
    newSlider.addEventListener('input', e => {
      state.rates.approval = parseInt(e.target.value) / 100;
      document.getElementById('approvalRateLabel').textContent = fmt.pct(state.rates.approval);
      updateBudgetSection();
      updateForecastSection();
    });
  }
}

// Patch in only the forecast section (used when levers toggle or approval changes)
function updateForecastSection() {
  if (!state.raw) return;
  const forecast = computeForecast(state.raw, state.rates.approval);
  const levers = computeLevers(state.raw, state.rates.approval, forecast);
  const existing = document.querySelector('.span-forecast');
  if (!existing) return;
  const wrapper = document.createElement('div');
  wrapper.innerHTML = renderForecastSection(forecast, levers, state.levers, state.raw, state.rates.approval);
  existing.replaceWith(wrapper.firstElementChild);
  // Re-attach checkbox handlers (DOM was replaced)
  document.querySelectorAll('input[data-lever]').forEach(cb => {
    cb.addEventListener('change', e => {
      const leverId = e.target.dataset.lever;
      state.levers[leverId] = e.target.checked;
      updateForecastSection();
    });
  });
}

function updateProjections() {
  const raw = state.raw;
  if (!raw) return;
  const periodEnd = raw.period.end;
  const periodStart = raw.period.start;
  const today = todayISO();
  const daysRemaining = Math.max(0, daysBetween(today, periodEnd));
  const daysSinceStart = Math.max(1, daysBetween(periodStart, today) + 1);
  const allNch = raw.nonCardHolders.length;
  const avgDailyNch = allNch / daysSinceStart;
  const totalApplied = raw.nonCardHolders.filter(r => r.applied === 'Y').length;
  const proj = Math.round(totalApplied + (avgDailyNch * daysRemaining * state.rates.signup));
  const estIssued = Math.round(totalApplied * state.rates.lead);
  const projEl = document.getElementById('projectedApps');
  if (projEl) projEl.textContent = fmt.num(proj);
  const totalFootfall = raw.cardHolders.length + allNch;
  renderFunnel(totalFootfall, allNch, totalApplied, estIssued);
}

// Lightweight toast notification — used by sync button for live feedback
function showToast(message, type, duration) {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'toast';
  toast.className = 'toast toast-' + (type || 'info');
  toast.textContent = message;
  document.body.appendChild(toast);

  requestAnimationFrame(() => toast.classList.add('toast-visible'));

  if (duration && duration > 0) {
    setTimeout(() => {
      toast.classList.remove('toast-visible');
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }
}

async function fetchData() {
  try {
    if (CONFIG.API_URL.includes('PASTE_YOUR')) {
      throw new Error('API_URL not configured. Open this file in a text editor and set CONFIG.API_URL to your deployed Apps Script Web App URL.');
    }
    // Cache-bust: timestamp + no-store so browser/CDN doesn't serve stale data
    const separator = CONFIG.API_URL.includes('?') ? '&' : '?';
    const url = CONFIG.API_URL + separator + '_t=' + Date.now();
    const res = await fetch(url, { cache: 'no-store' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    state.raw = dedupeSourceData(data);
    render();
  } catch (err) {
    document.getElementById('root').innerHTML = `
      <div class="error-state">
        <h3>Couldn't load dashboard data</h3>
        <div>${err.message}</div>
        <pre>${err.stack || ''}</pre>
      </div>
    `;
  }
}

const savedTheme = localStorage.getItem('share-dashboard-theme');
if (savedTheme) {
  state.theme = savedTheme;
  document.body.setAttribute('data-theme', savedTheme);
}

fetchData();
setInterval(fetchData, CONFIG.REFRESH_INTERVAL_MS);

// Tick the "Data X ago" display every 60s so it stays accurate
// without triggering a full data refetch.
setInterval(() => {
  if (!state.raw) return;
  const el = document.querySelector('.meta-block .timestamp');
  if (el) {
    const stamp = state.raw.dataLastUpdated || state.raw.generatedAt;
    el.textContent = `Data ${fmt.relativeTime(stamp)}`;
    el.title = `Exact: ${fmt.timestamp(stamp)}${state.raw.dataLastUpdated ? '' : ' (sheet timestamp not available — showing page fetch time)'}`;
  }
}, 60000);
